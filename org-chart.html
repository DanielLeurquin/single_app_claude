<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Organisation Chart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body:    ['Source Sans 3', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Source Sans 3', sans-serif; }

    .chart-svg { cursor: grab; user-select: none; display: block; width: 100%; height: 100%; }
    .chart-svg:active { cursor: grabbing; }

    .link-path { fill: none; stroke: #94a3b8; stroke-width: 1.5px; }

    /* NodeCard hover — applied to the foreignObject wrapper */
    .node-fo { overflow: visible; }
    .node-fo:hover .card-shell {
      box-shadow: 0 8px 24px rgba(15,23,42,0.13);
    }
    .card-shell {
      transition: box-shadow 0.15s ease, transform 0.15s ease;
      cursor: pointer;
    }
    .card-shell:hover { transform: translateY(-1px); }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 50;
    }
    #tooltip.show { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chart-area { animation: fadeUp 0.35s ease both; }
  </style>
</head>

<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef, useState, useCallback } = React;

/* ── Data ─────────────────────────────────────────────── */
const ORG = {
  id:1, name:"Sarah Chen", title:"Chief Executive Officer", dept:"Executive", location:"San Francisco",
  children:[
    { id:2, name:"Marcus Rivera", title:"Chief Technology Officer", dept:"Engineering", location:"Austin",
      children:[
        { id:7, name:"Priya Nair", title:"VP Engineering", dept:"Engineering", location:"Austin",
          children:[
            { id:14, name:"Leon Kim",    title:"Sr. Backend Engineer",  dept:"Engineering", location:"Austin" },
            { id:15, name:"Aisha Patel", title:"Sr. Frontend Engineer", dept:"Engineering", location:"Remote" },
            { id:16, name:"Tom Wallace", title:"DevOps Engineer",        dept:"Engineering", location:"Remote" },
          ]},
        { id:8, name:"Chris Okafor", title:"Head of Security", dept:"Engineering", location:"Austin",
          children:[
            { id:17, name:"Nina Rossi", title:"Security Analyst",  dept:"Engineering", location:"Austin" },
            { id:18, name:"Joe Tanaka", title:"Pen Test Engineer",  dept:"Engineering", location:"Remote" },
          ]},
      ]},
    { id:3, name:"Elena Vasquez", title:"Chief Product Officer", dept:"Product", location:"New York",
      children:[
        { id:9, name:"David Park", title:"VP Product", dept:"Product", location:"New York",
          children:[
            { id:19, name:"Leah Brooks", title:"Product Manager", dept:"Product", location:"New York" },
            { id:20, name:"Sam Torres",  title:"Product Manager", dept:"Product", location:"Remote"   },
          ]},
        { id:10, name:"Fatima Al-Amin", title:"Head of UX Research", dept:"Design", location:"New York",
          children:[
            { id:21, name:"Yuki Sato",  title:"UX Researcher", dept:"Design", location:"Tokyo"    },
            { id:22, name:"Oscar Bell", title:"UX Researcher", dept:"Design", location:"New York" },
          ]},
      ]},
    { id:4, name:"James Whitmore", title:"Chief Design Officer", dept:"Design", location:"London",
      children:[
        { id:11, name:"Mia Johansson", title:"Lead Visual Designer", dept:"Design", location:"London" },
        { id:12, name:"Ravi Sharma",   title:"Motion Designer",       dept:"Design", location:"Remote" },
      ]},
    { id:5, name:"Olivia Grant", title:"Chief Marketing Officer", dept:"Marketing", location:"Chicago",
      children:[
        { id:13, name:"Tyler Nguyen", title:"Growth Lead", dept:"Marketing", location:"Chicago",
          children:[
            { id:23, name:"Cara Diaz", title:"Growth Analyst", dept:"Marketing", location:"Chicago" },
            { id:24, name:"Ben Moore", title:"SEO Specialist",  dept:"Marketing", location:"Remote"  },
          ]},
      ]},
    { id:6, name:"Nathan Adeyemi", title:"Chief Financial Officer", dept:"Finance", location:"San Francisco",
      children:[
        { id:25, name:"Isla Crawford", title:"Finance Director",   dept:"Finance", location:"San Francisco" },
        { id:26, name:"Roy Kim",        title:"Financial Analyst",  dept:"Finance", location:"Remote"        },
      ]},
  ]
};

/* ── Department palette ───────────────────────────────── */
const DEPT = {
  Executive:   { stripe:"#3b82f6", badge:"#dbeafe", badgeTxt:"#1e40af", border:"#bfdbfe" },
  Engineering: { stripe:"#22c55e", badge:"#dcfce7", badgeTxt:"#166534", border:"#bbf7d0" },
  Product:     { stripe:"#8b5cf6", badge:"#ede9fe", badgeTxt:"#5b21b6", border:"#ddd6fe" },
  Design:      { stripe:"#ec4899", badge:"#fce7f3", badgeTxt:"#9d174d", border:"#fbcfe8" },
  Marketing:   { stripe:"#f97316", badge:"#ffedd5", badgeTxt:"#9a3412", border:"#fed7aa" },
  Finance:     { stripe:"#eab308", badge:"#fef9c3", badgeTxt:"#713f12", border:"#fef08a" },
  Operations:  { stripe:"#14b8a6", badge:"#ccfbf1", badgeTxt:"#134e4a", border:"#99f6e4" },
};

/* ── Layout constants ─────────────────────────────────── */
const NW   = 210;  // card width  (px, also foreignObject width)
const NH   = 82;   // card height (px, also foreignObject height)
const HGAP = 32;
const VGAP = 72;

/* ── Helpers ──────────────────────────────────────────── */
function initials(name) { return name.split(" ").map(n => n[0]).join("").slice(0,2).toUpperCase(); }
function clip(s, n)     { return s.length > n ? s.slice(0, n-1) + "…" : s; }
function hasKidsInTree(id, node = ORG) {
  if (node.id === id) return !!(node.children?.length);
  return node.children?.some(c => hasKidsInTree(id, c)) ?? false;
}

/* Straight elbow path between parent bottom-centre → child top-centre */
function elbow(sx, sy, tx, ty) {
  const midY = sy + NH + VGAP / 2;
  return `M${sx},${sy + NH} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
}

/* ══════════════════════════════════════════════════════
   NodeCard — standalone React component
   Receives the person's data + callbacks as props.
   Rendered inside an SVG <foreignObject> so D3 positions it.
   ══════════════════════════════════════════════════════ */
function NodeCard({ data, isRoot, isCollapsed, hasChildren, onToggle, onMouseEnter, onMouseLeave }) {
  const p = DEPT[data.dept] || DEPT.Executive;

  return (
    <div
      className="card-shell w-full h-full bg-white rounded-md overflow-hidden select-none"
      style={{
        border: `1px solid ${isRoot ? p.stripe : p.border}`,
        borderTopWidth: isRoot ? 2 : 1,
        boxShadow: isRoot
          ? "0 4px 14px rgba(15,23,42,0.12)"
          : "0 1px 6px rgba(15,23,42,0.07)",
      }}
      onClick={hasChildren ? onToggle : undefined}
      onMouseEnter={onMouseEnter}
      onMouseLeave={onMouseLeave}
    >
      {/* Dept colour stripe */}
      <div className="h-1.5 w-full" style={{ background: p.stripe }} />

      {/* Body */}
      <div className="flex items-center gap-3 px-3 pt-2 pb-1" style={{ height: NH - 6 }}>

        {/* Avatar */}
        <div
          className="flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold font-display"
          style={{ background: p.badge, color: p.badgeTxt, border: `1px solid ${p.border}` }}
        >
          {initials(data.name)}
        </div>

        {/* Text */}
        <div className="flex-1 min-w-0">
          <p
            className="font-display font-bold text-slate-800 leading-tight truncate"
            style={{ fontSize: 12 }}
          >
            {data.name}
          </p>
          <p
            className="text-slate-500 leading-snug truncate"
            style={{ fontSize: 10, marginTop: 2, fontFamily: "'Source Sans 3', sans-serif" }}
          >
            {clip(data.title, 30)}
          </p>
        </div>

        {/* Expand / collapse badge */}
        {hasChildren && (
          <div
            className="flex-shrink-0 w-5 h-5 rounded flex items-center justify-center text-white font-bold"
            style={{ fontSize: 13, background: p.stripe, lineHeight: 1 }}
          >
            {isCollapsed ? "+" : "−"}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   Tooltip component
   ══════════════════════════════════════════════════════ */
function Tooltip({ tip }) {
  const { show, x, y, d } = tip;
  const p = d ? (DEPT[d.dept] || DEPT.Executive) : {};
  return (
    <div
      id="tooltip"
      className={`bg-white border border-slate-200 rounded-lg shadow-lg px-4 py-3 font-body ${show ? "show" : ""}`}
      style={{ left: x, top: y, minWidth: 172 }}
    >
      {d && (
        <>
          <p className="font-display font-bold text-slate-800 text-sm mb-0.5">{d.name}</p>
          <p className="text-slate-400 text-xs mb-2">{d.title}</p>
          <div className="flex items-center gap-2 flex-wrap">
            <span
              className="px-2 py-0.5 rounded text-xs font-semibold"
              style={{ background: p.badge, color: p.badgeTxt }}
            >
              {d.dept}
            </span>
            <span className="text-slate-400 text-xs">📍 {d.location}</span>
          </div>
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   OrgChart — root component
   D3 computes layout; React renders everything as JSX.
   ══════════════════════════════════════════════════════ */
function OrgChart() {
  const svgRef  = useRef(null);
  const [transform, setTransform] = useState("translate(0,0) scale(1)");
  const [nodes,     setNodes]     = useState([]);
  const [links,     setLinks]     = useState([]);
  const [collapsed, setCollapsed] = useState({});
  const [tip,       setTip]       = useState({ show: false, x: 0, y: 0, d: null });

  /* Prune invisible children */
  const buildTree = useCallback(() => {
    function prune(n) {
      const c = { ...n };
      if (!collapsed[n.id] && n.children?.length) c.children = n.children.map(prune);
      else c.children = [];
      return c;
    }
    return prune(ORG);
  }, [collapsed]);

  /* Recompute layout whenever collapsed changes */
  useEffect(() => {
    const root = d3.hierarchy(buildTree());
    d3.tree().nodeSize([NW + HGAP, NH + VGAP]).separation((a,b) => a.parent===b.parent ? 1 : 1.25)(root);
    setNodes(root.descendants().map(d => ({ ...d.data, x: d.x, y: d.y, depth: d.depth })));
    setLinks(root.links().map(l => ({
      id: `${l.source.data.id}-${l.target.data.id}`,
      sx: l.source.x, sy: l.source.y,
      tx: l.target.x, ty: l.target.y,
    })));
  }, [buildTree]);

  /* Init pan/zoom via D3 — updates React state */
  useEffect(() => {
    const svg  = d3.select(svgRef.current);
    const W    = svgRef.current.clientWidth;
    const zoom = d3.zoom().scaleExtent([0.18, 2]).on("zoom", e => {
      setTransform(e.transform.toString());
    });
    svg.call(zoom);
    const init = d3.zoomIdentity.translate(W / 2, 48).scale(0.68);
    svg.call(zoom.transform, init);
  }, []);

  function toggle(id) { setCollapsed(p => ({ ...p, [id]: !p[id] })); }
  function collapseAll() {
    const ids = {};
    function walk(n) { if(n.children?.length){ ids[n.id]=true; n.children.forEach(walk); } }
    walk(ORG);
    setCollapsed(ids);
  }

  return (
    <div className="flex flex-col h-screen w-screen bg-slate-50 font-body">

      {/* ── Header ── */}
      <header className="flex items-center justify-between px-8 py-3 bg-white border-b border-slate-200 shadow-sm flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded border border-slate-200 flex items-center justify-center bg-slate-50">
            <svg viewBox="0 0 20 20" className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="1.5">
              <rect x="7" y="1" width="6" height="5" rx="1"/>
              <rect x="1" y="13" width="6" height="5" rx="1"/>
              <rect x="13" y="13" width="6" height="5" rx="1"/>
              <line x1="10" y1="6" x2="10" y2="10"/>
              <line x1="4"  y1="10" x2="16" y2="10"/>
              <line x1="4"  y1="10" x2="4"  y2="13"/>
              <line x1="16" y1="10" x2="16" y2="13"/>
            </svg>
          </div>
          <div>
            <h1 className="font-display text-lg font-bold text-slate-800 leading-tight">Organisation Chart</h1>
            <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">Acme Corporation · 2025</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setCollapsed({})}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Expand All
          </button>
          <button onClick={collapseAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Collapse All
          </button>
        </div>
      </header>

      {/* ── Chart canvas ── */}
      <div className="chart-area flex-1 relative overflow-hidden">
        <svg ref={svgRef} className="chart-svg">

          {/* Single <g> moved by D3 zoom transform */}
          <g transform={transform}>

            {/* Links — plain SVG paths */}
            {links.map(l => (
              <path key={l.id} className="link-path"
                d={elbow(l.sx, l.sy, l.tx, l.ty)} />
            ))}

            {/* Nodes — each card is a React component inside <foreignObject> */}
            {nodes.map(n => (
              <foreignObject
                key={n.id}
                className="node-fo"
                x={n.x - NW / 2}
                y={n.y}
                width={NW}
                height={NH}
                style={{ overflow: "visible" }}
              >
                {/* xmlns required for foreignObject HTML content */}
                <div xmlns="http://www.w3.org/1999/xhtml" style={{ width: NW, height: NH }}>
                  <NodeCard
                    data={n}
                    isRoot={n.depth === 0}
                    isCollapsed={!!collapsed[n.id]}
                    hasChildren={hasKidsInTree(n.id)}
                    onToggle={() => toggle(n.id)}
                    onMouseEnter={e => setTip({ show:true, x:e.clientX+14, y:e.clientY-10, d:n })}
                    onMouseLeave={() => setTip(t => ({ ...t, show:false }))}
                  />
                </div>
              </foreignObject>
            ))}
          </g>
        </svg>

        {/* Legend */}
        <div className="absolute bottom-5 left-5 bg-white border border-slate-200 rounded-lg shadow-sm p-3.5 text-xs">
          <p className="font-display font-bold text-slate-500 mb-2 uppercase tracking-widest text-xs">Departments</p>
          {Object.entries(DEPT).map(([dept, p]) => (
            <div key={dept} className="flex items-center gap-2 mb-1.5 last:mb-0">
              <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: p.stripe }}/>
              <span className="text-slate-500">{dept}</span>
            </div>
          ))}
        </div>

        {/* Hints */}
        <div className="absolute bottom-5 right-5 flex flex-col items-end gap-1.5">
          {["Scroll · Zoom", "Drag · Pan", "Click node · Toggle"].map(h => (
            <span key={h} className="bg-white border border-slate-200 rounded px-2.5 py-1 text-xs text-slate-400 shadow-sm">{h}</span>
          ))}
        </div>
      </div>

      {/* Tooltip */}
      <Tooltip tip={tip} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OrgChart/>);
</script>
</body>
</html>
