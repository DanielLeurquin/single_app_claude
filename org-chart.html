<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Organisation Chart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Source Sans 3', sans-serif; background: #f8fafc; }
    .chart-svg { cursor: grab; user-select: none; width: 100%; height: 100%; display: block; }
    .chart-svg:active { cursor: grabbing; }
    .link-path        { fill: none; stroke: #94a3b8; stroke-width: 1.5px; }
    .link-path-dashed { fill: none; stroke: #94a3b8; stroke-width: 1.5px; stroke-dasharray: 5 3; opacity: 0.55; }
    .card-shell { transition: box-shadow 0.15s, transform 0.15s; }
    .card-shell:hover { box-shadow: 0 6px 20px rgba(15,23,42,0.13) !important; transform: translateY(-1px); }
    #tooltip { position:fixed; pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:999; }
    #tooltip.show { opacity:1; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .chart-area { animation: fadeUp 0.35s ease both; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useRef, useState, useMemo } = React;

/* ═══════════════════════════════════════════════════════════
   ORG DATA
   Each person node has:
     dept        — the department this person belongs to
     deptParent  — (optional) declares that this person's dept
                   is a child of another dept. Only needs to
                   appear on ONE node per dept (the first/head).
                   This is how the dept hierarchy is declared.
   ═══════════════════════════════════════════════════════════ */
const ORG = {
  id:1,  name:"Sarah Chen",     title:"CEO",                 dept:"Executive",   location:"San Francisco",
  children:[
    /* Engineering division — parent dept is Executive */
    { id:2,  name:"Marcus Rivera",  title:"CTO",                  dept:"Engineering", deptParent:"Executive", location:"Austin",

            { id:15, name:"Aisha Patel",  title:"Sr. Frontend Eng.",    dept:"Engineering", location:"Remote" },
            { id:16, name:"Tom Wallace",  title:"DevOps Engineer",      dept:"Engineering", location:"Remote" },
          ]},
        /* Security is a child dept of Engineering */
        { id:8,  name:"Chris Okafor",   title:"Head of Security",     dept:"Security",    deptParent:"Engineering", location:"Austin",

            { id:17, name:"Nina Rossi",   title:"Security Analyst",     dept:"Security",    location:"Austin" },
            { id:18, name:"Joe Tanaka",   title:"Pen Test Engineer",    dept:"Security",    location:"Remote" },
          ]},
      ]},
    /* Product division — parent dept is Executive */
    { id:3,  name:"Elena Vasquez",  title:"CPO",                  dept:"Product",     deptParent:"Executive", location:"New York",
      children:[
        { id:9,  name:"David Park",     title:"VP Product",           dept:"Product",     location:"New York",
          children:[
            { id:19, name:"Leah Brooks",  title:"Product Manager",      dept:"Product",     location:"New York" },
            { id:20, name:"Sam Torres",   title:"Product Manager",      dept:"Product",     location:"Remote"   },
          ]},
        /* Design is a child dept of Product */
        { id:10, name:"Fatima Al-Amin", title:"Head of UX Research",  dept:"Design",      deptParent:"Product", location:"New York",
          children:[
            { id:21, name:"Yuki Sato",    title:"UX Researcher",        dept:"Design",      location:"Tokyo"    },
            { id:22, name:"Oscar Bell",   title:"UX Researcher",        dept:"Design",      location:"New York" },
          ]},
      ]},
    /* James also belongs to Design (same dept, no extra deptParent needed) */
    { id:4,  name:"James Whitmore", title:"CDO",                  dept:"Design",      location:"London",
      children:[
        { id:11, name:"Mia Johansson",  title:"Lead Visual Designer", dept:"Design",      location:"London" },
        { id:12, name:"Ravi Sharma",    title:"Motion Designer",      dept:"Design",      location:"Remote" },
      ]},
    /* Marketing — parent dept is Executive */
    { id:5,  name:"Olivia Grant",   title:"CMO",                  dept:"Marketing",   deptParent:"Executive", location:"Chicago",
      children:[
        { id:13, name:"Tyler Nguyen",   title:"Growth Lead",          dept:"Marketing",   location:"Chicago",
          children:[
            { id:23, name:"Cara Diaz",    title:"Growth Analyst",       dept:"Marketing",   location:"Chicago" },
            { id:24, name:"Ben Moore",    title:"SEO Specialist",       dept:"Marketing",   location:"Remote"  },
          ]},
      ]},
    /* Finance — parent dept is Executive */
    { id:6,  name:"Nathan Adeyemi", title:"CFO",                  dept:"Finance",     deptParent:"Executive", location:"San Francisco",
      children:[
        { id:25, name:"Isla Crawford",  title:"Finance Director",     dept:"Finance",     location:"San Francisco" },
        { id:26, name:"Roy Kim",        title:"Financial Analyst",    dept:"Finance",     location:"Remote"        },
      ]},
  ]
};

/* ═══════════════════════════════════════════════════════════
   DEPT HIERARCHY
   Derived automatically from deptParent fields in ORG.
   Returns: { childDept → parentDept } map
   ═══════════════════════════════════════════════════════════ */
function extractDeptHierarchy(node, map = {}) {
  if (node.deptParent && !(node.dept in map)) {
    map[node.dept] = node.deptParent;
  }
  (node.children || []).forEach(c => extractDeptHierarchy(c, map));
  return map; // e.g. { Engineering:"Executive", Security:"Engineering", ... }
}

// Returns all ancestor depts of a given dept (closest first)
function deptAncestors(dept, hierarchy) {
  const ancestors = [];
  let cur = hierarchy[dept];
  while (cur) { ancestors.push(cur); cur = hierarchy[cur]; }
  return ancestors;
}

// Returns all descendant depts of a given dept
function deptDescendants(dept, hierarchy) {
  const desc = [];
  Object.entries(hierarchy).forEach(([child, parent]) => {
    if (parent === dept) {
      desc.push(child);
      desc.push(...deptDescendants(child, hierarchy));
    }
  });
  return desc;
}

// Nesting depth: 0 = root dept, 1 = child, 2 = grandchild…
function deptDepth(dept, hierarchy) {
  return deptAncestors(dept, hierarchy).length;
}

/* ═══════════════════════════════════════════════════════════
   DEPT COLOURS — generated dynamically.
   Parent depts get a lighter bg so children visually sit
   "inside" them. Label colour stays saturated at all depths.
   ═══════════════════════════════════════════════════════════ */
function collectDepts(node, seen = []) {
  if (!seen.includes(node.dept)) seen.push(node.dept);
  (node.children || []).forEach(c => collectDepts(c, seen));
  return seen;
}

function buildDeptColors(orgRoot, hierarchy) {
  const depts      = collectDepts(orgRoot);
  const GOLDEN     = 137.5;
  const START_HUE  = 210;
  const map = {};
  depts.forEach((dept, i) => {
    const h     = (START_HUE + i * GOLDEN) % 360;
    const depth = deptDepth(dept, hierarchy);
    // Deeper nesting → slightly less light bg so the layering reads clearly
    const bgL   = Math.max(90, 97 - depth * 3);
    map[dept] = {
      bg:     `hsl(${h},55%,${bgL}%)`,
      border: `hsl(${h},55%,72%)`,
      label:  `hsl(${h},70%,28%)`,
    };
  });
  return map;
}

/* These are computed once at module level, before any React code */
const DEPT_HIERARCHY = extractDeptHierarchy(ORG);
const DEPT_COLOR     = buildDeptColors(ORG, DEPT_HIERARCHY);

/* ═══════════════════════════════════════════════════════════
   LAYOUT CONSTANTS
   ═══════════════════════════════════════════════════════════ */
const NW        = 200;  // card width
const NH        = 76;   // card height
const H_GAP     = 30;   // horizontal gap between sibling cards
const V_GAP     = 56;   // vertical gap between levels
const BOX_PAD   = 22;   // padding inside each dept box
const BOX_TOP   = 36;   // label bar height at top of dept box
const PARENT_EXTRA = 18; // extra padding added per nesting level for parent boxes
const BOX_SEP   = 14;   // min gap between non-ancestor-related dept boxes

/* ═══════════════════════════════════════════════════════════
   STEP 1 — D3 tree layout
   ═══════════════════════════════════════════════════════════ */
function runD3Layout(orgNode) {
  const root = d3.hierarchy(orgNode);
  d3.tree()
    .nodeSize([NW + H_GAP, NH + V_GAP])
    .separation((a, b) => a.parent === b.parent ? 1 : 1.3)
    (root);
  const nodes = [];
  root.each(d => {
    nodes.push({
      id:       d.data.id,
      parentId: d.parent ? d.parent.data.id : null,
      dept:     d.data.dept,
      x:        d.x - NW / 2,
      y:        d.y,
      data:     d.data,
      depth:    d.depth,
    });
  });
  return nodes;
}

/* ═══════════════════════════════════════════════════════════
   STEP 2a — Raw bounding box for each dept (from card coords)
   ═══════════════════════════════════════════════════════════ */
function computeRawBoxes(nodes) {
  const bounds = {};
  nodes.forEach(n => {
    const d = n.dept;
    if (!bounds[d]) bounds[d] = { minX:Infinity, minY:Infinity, maxX:-Infinity, maxY:-Infinity };
    const b = bounds[d];
    b.minX = Math.min(b.minX, n.x);
    b.minY = Math.min(b.minY, n.y);
    b.maxX = Math.max(b.maxX, n.x + NW);
    b.maxY = Math.max(b.maxY, n.y + NH);
  });
  const boxes = {};
  Object.entries(bounds).forEach(([dept, b]) => {
    boxes[dept] = {
      dept,
      x: b.minX - BOX_PAD,
      y: b.minY - BOX_TOP,
      w: (b.maxX - b.minX) + BOX_PAD * 2,
      h: (b.maxY - b.minY) + BOX_TOP + BOX_PAD,
    };
  });
  return boxes;
}

/* ═══════════════════════════════════════════════════════════
   STEP 2b — Expand parent dept boxes to enclose their
   children boxes (recursively, bottom-up).
   Each parent level adds PARENT_EXTRA padding around its
   children so nested borders are clearly visible.
   ═══════════════════════════════════════════════════════════ */
function expandParentBoxes(boxes, hierarchy) {
  // Process in order: deepest children first
  const allDepts = Object.keys(boxes);

  // Sort by depth descending (deepest first) so children are finalized
  // before their parents try to enclose them
  const sorted = [...allDepts].sort(
    (a, b) => deptDepth(b, hierarchy) - deptDepth(a, hierarchy)
  );

  sorted.forEach(child => {
    const parent = hierarchy[child];
    if (!parent || !boxes[parent] || !boxes[child]) return;

    const pb = boxes[parent];
    const cb = boxes[child];
    const extra = PARENT_EXTRA;

    // Expand parent to fully contain child + extra breathing room
    const newX = Math.min(pb.x, cb.x - extra);
    const newY = Math.min(pb.y, cb.y - extra);
    const newR = Math.max(pb.x + pb.w, cb.x + cb.w + extra);
    const newB = Math.max(pb.y + pb.h, cb.y + cb.h + extra);

    boxes[parent] = { ...pb, x: newX, y: newY, w: newR - newX, h: newB - newY };
  });

  return boxes;
}

/* ═══════════════════════════════════════════════════════════
   STEP 2c — Separate non-ancestor-related overlapping boxes
   by shifting their nodes sideways.
   ═══════════════════════════════════════════════════════════ */
function separateBoxes(nodes) {
  const xs = {};
  nodes.forEach(n => { xs[n.id] = 0; });

  function getBox(dept) {
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    nodes.forEach(n => {
      if (n.dept !== dept) return;
      const nx = n.x + xs[n.id];
      minX = Math.min(minX, nx); minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, nx + NW); maxY = Math.max(maxY, n.y + NH);
    });
    if (minX === Infinity) return null;
    return { x:minX-BOX_PAD, y:minY-BOX_TOP, w:(maxX-minX)+BOX_PAD*2, h:(maxY-minY)+BOX_TOP+BOX_PAD };
  }

  function overlaps(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function isAncestorRelated(da, db) {
    // returns true if one is an ancestor of the other in the dept hierarchy
    return deptAncestors(da, DEPT_HIERARCHY).includes(db) ||
           deptAncestors(db, DEPT_HIERARCHY).includes(da);
  }

  const depts = [...new Set(nodes.map(n => n.dept))];

  for (let pass = 0; pass < 40; pass++) {
    let anyMoved = false;
    for (let i = 0; i < depts.length; i++) {
      for (let j = i+1; j < depts.length; j++) {
        const da = depts[i], db = depts[j];
        if (isAncestorRelated(da, db)) continue; // nesting is intentional
        const ba = getBox(da), bb = getBox(db);
        if (!ba || !bb || !overlaps(ba, bb)) continue;

        const overlapX = Math.min(ba.x+ba.w, bb.x+bb.w) - Math.max(ba.x, bb.x) + BOX_SEP;
        const half = overlapX / 2;
        const [leftDept, rightDept] = (ba.x + ba.w/2) <= (bb.x + bb.w/2) ? [da,db] : [db,da];

        nodes.forEach(n => {
          if (n.dept === rightDept) xs[n.id] += half;
          if (n.dept === leftDept)  xs[n.id] -= half;
        });
        anyMoved = true;
      }
    }
    if (!anyMoved) break;
  }

  return nodes.map(n => ({ ...n, x: n.x + xs[n.id] }));
}

/* ═══════════════════════════════════════════════════════════
   STEP 2 — Full box pipeline
   ═══════════════════════════════════════════════════════════ */
function computeDeptBoxes(nodes) {
  const raw = computeRawBoxes(nodes);
  return expandParentBoxes(raw, DEPT_HIERARCHY);
}

/* ═══════════════════════════════════════════════════════════
   STEP 3 — Build links, rerouting through dept boxes when
   nodes are hidden due to dept collapse.
   ═══════════════════════════════════════════════════════════ */
function buildLinks(allNodes, visibleIds, allBoxes, collapsedDepts) {
  const nodeById = Object.fromEntries(allNodes.map(n => [n.id, n]));

  // When a dept is collapsed, find the "effective visible ancestor box"
  // i.e. walk up the dept hierarchy until we find one that isn't collapsed
  function effectiveDeptBox(dept) {
    let d = dept;
    while (d) {
      if (!collapsedDepts[d] && allBoxes[d]) return { key: d, box: allBoxes[d] };
      const parent = DEPT_HIERARCHY[d];
      if (!parent) break;
      d = parent;
    }
    // If everything is collapsed up to root, use the dept's own box
    return allBoxes[dept] ? { key: dept, box: allBoxes[dept] } : null;
  }

  function resolveAnchor(node, side) {
    if (visibleIds.has(node.id)) {
      return {
        key: String(node.id),
        x: node.x + NW / 2,
        y: side === 'bottom' ? node.y + NH : node.y,
      };
    }
    const eff = effectiveDeptBox(node.dept);
    if (!eff) return null;
    const { key, box } = eff;
    const cx = box.x + box.w / 2;
    return {
      key,
      x: cx,
      y: side === 'bottom' ? box.y + BOX_TOP : box.y,
    };
  }

  const seen = new Set();
  const links = [];

  allNodes.forEach(n => {
    if (n.parentId === null) return;
    const parent = nodeById[n.parentId];
    if (!parent) return;

    const parentHidden = !visibleIds.has(parent.id);
    const childHidden  = !visibleIds.has(n.id);

    if (parentHidden && childHidden && parent.dept === n.dept) return;

    const from = resolveAnchor(parent, 'bottom');
    const to   = resolveAnchor(n,      'top');
    if (!from || !to || from.key === to.key) return;

    const dedupKey = `${from.key}→${to.key}`;
    if (seen.has(dedupKey)) return;
    seen.add(dedupKey);

    links.push({
      id: dedupKey,
      px: from.x, py: from.y,
      cx: to.x,   cy: to.y,
      dashed: parentHidden || childHidden,
    });
  });

  return links;
}

function elbowPath(px, py, cx, cy) {
  const midY = py + (cy - py) / 2;
  return `M${px},${py} L${px},${midY} L${cx},${midY} L${cx},${cy}`;
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
function initials(name) { return name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase(); }
function clip(s, n) { return s.length > n ? s.slice(0,n-1)+"…" : s; }

// Sort depts so parents render before (behind) children
function sortDeptsByNesting(boxes) {
  return Object.keys(boxes).sort(
    (a, b) => deptDepth(a, DEPT_HIERARCHY) - deptDepth(b, DEPT_HIERARCHY)
  );
}

/* ═══════════════════════════════════════════════════════════
   Visibility: a node is hidden if its dept OR any ancestor
   dept in the hierarchy is collapsed.
   ═══════════════════════════════════════════════════════════ */
function isDeptVisible(dept, collapsedDepts) {
  if (collapsedDepts[dept]) return false;
  const ancestors = deptAncestors(dept, DEPT_HIERARCHY);
  return !ancestors.some(a => collapsedDepts[a]);
}

/* ═══════════════════════════════════════════════════════════
   NodeCard — React component
   ═══════════════════════════════════════════════════════════ */
function NodeCard({ data, onMouseEnter, onMouseLeave }) {
  return (
    <div className="card-shell w-full h-full bg-white rounded-md overflow-hidden select-none"
      style={{ border:"1px solid #e2e8f0", boxShadow:"0 1px 4px rgba(15,23,42,0.08)" }}
      onMouseEnter={onMouseEnter}
      onMouseLeave={onMouseLeave}
    >
      <div className="h-1 w-full bg-slate-200" />
      <div className="flex items-center gap-2.5 px-3" style={{ height: NH - 4 }}>
        <div className="flex-shrink-0 w-9 h-9 rounded-full bg-slate-100 border border-slate-200
                        flex items-center justify-center font-display font-bold text-slate-500"
          style={{ fontSize:11 }}>
          {initials(data.name)}
        </div>
        <div className="flex-1 min-w-0">
          <p className="font-display font-bold text-slate-800 truncate leading-tight" style={{ fontSize:12 }}>
            {data.name}
          </p>
          <p className="text-slate-400 truncate leading-snug font-body" style={{ fontSize:10, marginTop:2 }}>
            {clip(data.title, 28)}
          </p>
          <p className="text-slate-300 font-body" style={{ fontSize:9, marginTop:1 }}>
            📍 {data.location}
          </p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DeptBox — React component
   ═══════════════════════════════════════════════════════════ */
function DeptBox({ dept, x, y, w, h, collapsed, depth, onToggle }) {
  const p = DEPT_COLOR[dept] || { bg:"#f8fafc", border:"#cbd5e1", label:"#475569" };
  const displayH = collapsed ? BOX_TOP : h;
  return (
    <foreignObject x={x} y={y} width={w} height={displayH} style={{ overflow:"visible" }}>
      <div xmlns="http://www.w3.org/1999/xhtml" style={{ width:w, height:displayH }}>
        <div style={{
          width:"100%", height:"100%",
          background: collapsed ? "transparent" : p.bg,
          border:`${depth === 0 ? 2 : 1.5}px dashed ${p.border}`,
          borderRadius: 10 - depth,
          overflow:"hidden",
        }}>
          <div className="flex items-center gap-1.5 select-none cursor-pointer"
            style={{ padding:"8px 10px 6px 12px" }}
            onClick={onToggle}
          >
            <span style={{ width:8, height:8, borderRadius:"50%", background:p.label, flexShrink:0, display:"inline-block" }}/>
            <span className="font-display font-bold uppercase"
              style={{ fontSize:9, color:p.label, letterSpacing:"0.12em" }}>
              {dept}
            </span>
            <span className="ml-auto flex items-center justify-center font-bold"
              style={{ width:16, height:16, fontSize:14, color:p.label, lineHeight:1, flexShrink:0 }}>
              {collapsed ? "+" : "−"}
            </span>
          </div>
        </div>
      </div>
    </foreignObject>
  );
}

/* ═══════════════════════════════════════════════════════════
   Tooltip
   ═══════════════════════════════════════════════════════════ */
function Tooltip({ tip }) {
  const { show, x, y, d } = tip;
  const p = d ? (DEPT_COLOR[d.dept] || { bg:"#f1f5f9", label:"#475569" }) : {};
  return (
    <div id="tooltip"
      className={`bg-white border border-slate-200 rounded-lg shadow-xl px-4 py-3 font-body ${show?"show":""}`}
      style={{ left:x, top:y, minWidth:170 }}>
      {d && <>
        <p className="font-display font-bold text-slate-800 text-sm mb-0.5">{d.name}</p>
        <p className="text-slate-400 text-xs mb-2">{d.title}</p>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="px-2 py-0.5 rounded text-xs font-semibold"
            style={{ background:p.bg, color:p.label }}>{d.dept}</span>
          {DEPT_HIERARCHY[d.dept] && (
            <span className="text-slate-300 text-xs">within {DEPT_HIERARCHY[d.dept]}</span>
          )}
          <span className="text-slate-400 text-xs">📍 {d.location}</span>
        </div>
      </>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   OrgChart — root component
   ═══════════════════════════════════════════════════════════ */
function OrgChart() {
  const svgRef = useRef(null);
  const [svgTransform, setSvgTransform] = useState("");
  const [collapsedDepts, setCollapsedDepts] = useState({});
  const [tip, setTip] = useState({ show:false, x:0, y:0, d:null });

  /* Full layout — computed once */
  const allNodes = useMemo(() => {
    const raw = runD3Layout(ORG);
    return separateBoxes(raw);
  }, []);

  const allBoxes     = useMemo(() => computeDeptBoxes(allNodes), [allNodes]);
  const sortedDepts  = useMemo(() => sortDeptsByNesting(allBoxes), [allBoxes]);

  /* Visible nodes: hidden if dept OR any ancestor dept is collapsed */
  const visibleNodes = useMemo(() =>
    allNodes.filter(n => isDeptVisible(n.dept, collapsedDepts)),
    [allNodes, collapsedDepts]
  );

  const visibleIds = useMemo(() => new Set(visibleNodes.map(n => n.id)), [visibleNodes]);

  const links = useMemo(() =>
    buildLinks(allNodes, visibleIds, allBoxes, collapsedDepts),
    [allNodes, visibleIds, allBoxes, collapsedDepts]
  );

  /* D3 zoom — init once */
  useEffect(() => {
    const svg = d3.select(svgRef.current);
    const W   = svgRef.current.clientWidth;
    const zoom = d3.zoom().scaleExtent([0.1, 2.5])
      .on("zoom", e => setSvgTransform(e.transform.toString()));
    svg.call(zoom);
    svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, 48).scale(0.58));
  }, []);

  function toggleDept(dept) {
    setCollapsedDepts(p => ({ ...p, [dept]: !p[dept] }));
  }

  function expandAll() { setCollapsedDepts({}); }

  function collapseAll() {
    const all = {};
    sortedDepts.forEach(d => { all[d] = true; });
    setCollapsedDepts(all);
  }

  // Build legend tree so parent depts show their children indented
  function buildLegendTree(dept, depth = 0) {
    const p = DEPT_COLOR[dept] || { label:"#475569", bg:"#f1f5f9" };
    const children = Object.entries(DEPT_HIERARCHY)
      .filter(([, parent]) => parent === dept)
      .map(([child]) => child);
    return (
      <div key={dept}>
        <div className="flex items-center gap-2 mb-1.5" style={{ paddingLeft: depth * 12 }}>
          <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background:p.label }}/>
          <span className="text-slate-500 text-xs">{dept}</span>
        </div>
        {children.map(c => buildLegendTree(c, depth + 1))}
      </div>
    );
  }
  // Root depts = those with no parent
  const rootDepts = sortedDepts.filter(d => !DEPT_HIERARCHY[d]);

  return (
    <div className="flex flex-col h-screen w-screen font-body" style={{ background:"#f8fafc" }}>

      {/* Header */}
      <header className="flex items-center justify-between px-8 py-3 bg-white border-b border-slate-200 shadow-sm flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded border border-slate-200 flex items-center justify-center bg-slate-50">
            <svg viewBox="0 0 20 20" className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="1.5">
              <rect x="7" y="1" width="6" height="5" rx="1"/>
              <rect x="1" y="13" width="6" height="5" rx="1"/>
              <rect x="13" y="13" width="6" height="5" rx="1"/>
              <line x1="10" y1="6" x2="10" y2="10"/>
              <line x1="4"  y1="10" x2="16" y2="10"/>
              <line x1="4"  y1="10" x2="4"  y2="13"/>
              <line x1="16" y1="10" x2="16" y2="13"/>
            </svg>
          </div>
          <div>
            <h1 className="font-display text-lg font-bold text-slate-800 leading-tight">Organisation Chart</h1>
            <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">Acme Corporation · 2025</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={expandAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Expand All
          </button>
          <button onClick={collapseAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Collapse All
          </button>
        </div>
      </header>

      {/* Canvas */}
      <div className="chart-area flex-1 relative overflow-hidden">
        <svg ref={svgRef} className="chart-svg">
          <g transform={svgTransform}>

            {/* Dept boxes — parents (depth 0) first so children render on top */}
            {sortedDepts.map(dept => {
              const b = allBoxes[dept];
              if (!b) return null;
              return (
                <DeptBox
                  key={dept}
                  dept={dept}
                  x={b.x} y={b.y} w={b.w} h={b.h}
                  collapsed={!!collapsedDepts[dept]}
                  depth={deptDepth(dept, DEPT_HIERARCHY)}
                  onToggle={() => toggleDept(dept)}
                />
              );
            })}

            {/* Links */}
            {links.map(l => (
              <path key={l.id}
                className={l.dashed ? "link-path-dashed" : "link-path"}
                d={elbowPath(l.px, l.py, l.cx, l.cy)} />
            ))}

            {/* Cards */}
            {visibleNodes.map(n => (
              <foreignObject key={n.id} x={n.x} y={n.y} width={NW} height={NH} style={{ overflow:"visible" }}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{ width:NW, height:NH }}>
                  <NodeCard
                    data={n.data}
                    onMouseEnter={e => setTip({ show:true, x:e.clientX+14, y:e.clientY-10, d:n.data })}
                    onMouseLeave={() => setTip(t => ({ ...t, show:false }))}
                  />
                </div>
              </foreignObject>
            ))}

          </g>
        </svg>

        {/* Legend — shows dept hierarchy with indentation */}
        <div className="absolute bottom-5 left-5 bg-white border border-slate-200 rounded-lg shadow-sm p-3.5">
          <p className="font-display font-bold text-slate-500 mb-2 uppercase tracking-widest" style={{ fontSize:9 }}>Departments</p>
          {rootDepts.map(d => buildLegendTree(d, 0))}
        </div>

        {/* Hints */}
        <div className="absolute bottom-5 right-5 flex flex-col items-end gap-1.5">
          {["Scroll · Zoom","Drag · Pan","Click dept label · Toggle"].map(h => (
            <span key={h} className="bg-white border border-slate-200 rounded px-2.5 py-1 text-xs text-slate-400 shadow-sm">{h}</span>
          ))}
        </div>
      </div>

      <Tooltip tip={tip} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OrgChart/>);
</script>
</body>
</html>
