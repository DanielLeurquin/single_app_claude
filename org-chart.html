<script type="text/babel">

/* ═══════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   HIERARCHY HELPERS
   ═══════════════════════════════════════════════════════════ */
function deptAncestors(dept) {
  const a=[]; let c=DEPT_HIERARCHY[dept];
  while(c){ a.push(c); c=DEPT_HIERARCHY[c]; }
  return a;
}
function deptDepth(dept){ return deptAncestors(dept).length; }
function directChildDepts(parent){
  return Object.entries(DEPT_HIERARCHY).filter(([,p])=>p===parent).map(([c])=>c);
}
function isAncestorDept(ancestor, dept){
  return deptAncestors(dept).includes(ancestor);
}
function allDeptNames(){
  const leaf=[];
  function walk(n){ if(!leaf.includes(n.dept)) leaf.push(n.dept); (n.children||[]).forEach(walk); }
  walk(ORG);
  return [...new Set([...leaf,...Object.values(DEPT_HIERARCHY),...Object.keys(DEPT_HIERARCHY)])];
}

/* ═══════════════════════════════════════════════════════════
   DEPT COLOURS
   ═══════════════════════════════════════════════════════════ */
const DEPT_COLOR = (() => {
  const depts=allDeptNames(), map={};
  depts.forEach((d,i)=>{
    const h=(210+i*137.5)%360, dep=deptDepth(d);
    map[d]={ bg:`hsl(${h},55%,${Math.max(90,97-dep*3)}%)`, border:`hsl(${h},55%,72%)`, label:`hsl(${h},70%,28%)` };
  });
  return map;
})();

/* ═══════════════════════════════════════════════════════════
   LAYOUT CONSTANTS
   ═══════════════════════════════════════════════════════════ */
const NW        = 200;   // card width
const NH        = 76;    // card height
const COL_GAP   = 28;    // horizontal gap between cards
const BOX_PAD   = 18;    // inner padding of dept box
const BOX_TOP   = 34;    // dept label bar height
const NEST_PAD  = 14;    // extra padding per nesting depth level
const PILL_W    = 160;
const PILL_H    = 34;
const V_GAP_MIN = 40;    // minimum vertical gap between a card bottom and content below
const BOX_SEP   = 12;    // minimum gap between non-related boxes in separation pass

/* ═══════════════════════════════════════════════════════════
   BUILD LAYOUT
   ═══════════════════════════════════════════════════════════

   Key design decisions that fix the two bugs:

   BUG 1 (Elena overlapping child boxes):
   The vertical position of each row is computed AFTER we know
   the full nesting depth of all depts whose boxes open between
   that row and the previous one. Specifically, for each node
   at row R, we look at all dept boxes that "open" (start their
   label bar) between row R-1 and row R, and compute how much
   vertical space those opening borders consume. Row R's Y is
   then set to be below all of that overhead.

   BUG 2 (collapsed parent-of-collapsed-children disappears):
   A "pure container" dept (one with no direct person nodes,
   like Engineering-Security) can be collapsed. Its pill column
   must be reserved even if we never encounter a node in that
   dept during the DFS. We handle this by walking the ORG tree
   FIRST to find the earliest ORG-tree row for each dept
   (deptFirstRow), and then in the DFS, when a node's dept
   has a collapsed ANCESTOR dept-container, we claim a column
   for that container if it hasn't been claimed yet, regardless
   of whether that container has its own person nodes.
   ═══════════════════════════════════════════════════════════ */

function buildLayout(orgRoot, collapsedDepts) {

  /* ── Pre-pass: find the org-tree row each dept first appears on ── */
  const deptFirstRow = {}; // dept → minimum org-tree row depth
  function findFirstRows(node, row) {
    const d = node.dept;
    if (deptFirstRow[d] === undefined || row < deptFirstRow[d]) deptFirstRow[d] = row;
    (node.children||[]).forEach(c => findFirstRows(c, row+1));
  }
  findFirstRows(orgRoot, 0);

  /* ── Helper: which dept is the "effective collapsed root" for a dept ──
     When a dept is collapsed (or an ancestor is), we render a pill for
     the outermost collapsed dept in the ancestry chain.              */
  function effectiveCollapsedRoot(dept) {
    // Walk from outermost ancestor down to dept; find the outermost collapsed one
    const chain = [...deptAncestors(dept).reverse(), dept];
    for (const d of chain) {
      if (collapsedDepts[d]) return d;
    }
    return null;
  }

  function isDeptHidden(dept) {
    // A dept is hidden if it or any ancestor is collapsed
    return !!(collapsedDepts[dept] || deptAncestors(dept).some(a => collapsedDepts[a]));
  }

  /* ── DFS column assignment ──
     Returns the [colStart, colEnd] span for the subtree.
     Nodes of hidden depts don't get person entries but DO reserve
     a column for their pill (if they are the effective collapsed root).
  */
  let nextCol = 0;
  const nodes      = [];       // visible person nodes
  const pillCols   = {};       // collapsedDept → column index
  const pillXOff   = {};       // collapsedDept → additional x offset (separation pass)

  function layoutNode(orgNode, row, parentId) {
    const dept = orgNode.dept;
    const collapsedRoot = effectiveCollapsedRoot(dept);

    if (collapsedRoot !== null) {
      // This subtree is collapsed. Claim a column for the pill if not done yet.
      if (pillCols[collapsedRoot] === undefined) {
        pillCols[collapsedRoot] = nextCol;
        pillXOff[collapsedRoot] = 0;
        nextCol++;
      }
      return [pillCols[collapsedRoot], pillCols[collapsedRoot]];
    }

    // Expanded: recurse children first
    const childSpans = (orgNode.children||[]).map(c => layoutNode(c, row+1, orgNode.id));
    const valid = childSpans.filter(([s,e]) => e >= s);

    let colStart, colEnd;
    if (valid.length === 0) {
      colStart = colEnd = nextCol++;
    } else {
      colStart = valid[0][0];
      colEnd   = valid[valid.length-1][1];
      if (nextCol <= colEnd) nextCol = colEnd + 1;
    }

    nodes.push({
      id:       orgNode.id,
      parentId: parentId,
      dept:     dept,
      data:     orgNode,
      col:      (colStart + colEnd) / 2,
      row:      row,
      colStart, colEnd,
    });

    return [colStart, colEnd];
  }

  layoutNode(orgRoot, 0, null);

  /* ── Compute per-row Y positions ──
     For each row R (R≥1), the Y position must be large enough that:
       rowY[R] >= rowY[R-1] + NH + overhead

     "overhead" = the maximum vertical space consumed by dept box
     label bars that open just above row R. A dept box "opens above
     row R" if the dept's first node is at row R. Each such dept
     contributes (BOX_TOP + NEST_PAD) * (its nesting depth + 1) of
     vertical clearance that must fit between row R-1's cards and
     row R's cards.

     We only count visible (non-collapsed) depts.
  */
  const maxOrgRow = nodes.reduce((m,n) => Math.max(m, n.row), 0);
  const rowY      = new Array(maxOrgRow + 1).fill(0);

  for (let r = 1; r <= maxOrgRow; r++) {
    // Depts whose first node sits at row r and are currently visible
    const opening = Object.entries(deptFirstRow)
      .filter(([d, firstR]) => firstR === r && !isDeptHidden(d))
      .map(([d]) => d);

    // For each such dept, count how many visible ancestor dept boxes
    // also "span" across the row r boundary (they started at or before r-1
    // and their content goes to r or beyond). These all stack vertically.
    let maxOverhead = V_GAP_MIN;
    opening.forEach(dept => {
      const visAncestors = deptAncestors(dept).filter(a => !isDeptHidden(a));
      // +1 for the dept's own label bar, +1 per visible ancestor
      const stackDepth = visAncestors.length + 1;
      const overhead   = stackDepth * (BOX_TOP + NEST_PAD) + V_GAP_MIN;
      if (overhead > maxOverhead) maxOverhead = overhead;
    });

    rowY[r] = rowY[r-1] + NH + maxOverhead;
  }

  /* ── Initial pixel positions ── */
  nodes.forEach(n => {
    n.x = n.col * (NW + COL_GAP);
    n.y = rowY[n.row];
  });

  /* ── Compute boxes from current node/pill positions ──
     Pills: centred on their column, at the row of their first dept node.
     Expanded depts: bounding box of own nodes + child dept boxes + padding.
     The box top is always clamped to be BELOW the bottom of any ancestor
     dept's own person cards (so child boxes never overlap parent cards).
  */
  const deptOrder = allDeptNames().sort((a,b) => deptDepth(b) - deptDepth(a));

  function computeBoxes() {
    const boxes = {};

    /* Pills first */
    Object.entries(pillCols).forEach(([dept, col]) => {
      const row = deptFirstRow[dept] ?? 0;
      const py  = rowY[Math.min(row, maxOrgRow)] ?? 0;
      const px  = col * (NW + COL_GAP) + (pillXOff[dept] || 0);

      // Clamp pill Y: must sit BELOW the bottom edge of every ancestor dept's
      // own person cards. Without this, pills of collapsed child depts float
      // up and visually overlap their manager's card.
      let minPillY = py;
      deptAncestors(dept).forEach(anc => {
        nodes.forEach(n => {
          if (n.dept !== anc) return;
          minPillY = Math.max(minPillY, n.y + NH + V_GAP_MIN);
        });
      });

      boxes[dept] = {
        dept, pill: true,
        x: px + (NW - PILL_W) / 2,
        y: minPillY,
        w: PILL_W, h: PILL_H,
      };
    });

    /* Expanded depts — deepest first so children are available when parents run */
    deptOrder.forEach(dept => {
      if (isDeptHidden(dept)) return;
      if (boxes[dept]) return; // already set (pill)

      let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;

      // Own person nodes
      nodes.forEach(n => {
        if (n.dept !== dept) return;
        minX=Math.min(minX,n.x);    minY=Math.min(minY,n.y);
        maxX=Math.max(maxX,n.x+NW); maxY=Math.max(maxY,n.y+NH);
      });

      // Direct child dept boxes (already computed — deepest first)
      directChildDepts(dept).forEach(child => {
        const cb = boxes[child];
        if (!cb) return;
        minX=Math.min(minX,cb.x);      minY=Math.min(minY,cb.y);
        maxX=Math.max(maxX,cb.x+cb.w); maxY=Math.max(maxY,cb.y+cb.h);
      });

      if (!isFinite(minX)) return;

      const depth = deptDepth(dept);
      const pad   = BOX_PAD + depth * NEST_PAD;

      // Clamp box top: must be BELOW the bottom of every ancestor dept's own cards.
      // This prevents child dept boxes from visually overlapping parent person cards.
      let clampY = -Infinity;
      deptAncestors(dept).forEach(anc => {
        nodes.forEach(n => {
          if (n.dept !== anc) return;
          clampY = Math.max(clampY, n.y + NH + V_GAP_MIN);
        });
      });

      const rawTop = minY - BOX_TOP - pad;
      const boxTop = isFinite(clampY) ? Math.max(rawTop, clampY) : rawTop;
      const boxBot = maxY + pad;
      if (boxBot <= boxTop) return;

      boxes[dept] = {
        dept, pill: false,
        x: minX - pad,
        y: boxTop,
        w: (maxX - minX) + pad * 2,
        h: boxBot - boxTop,
      };
    });

    return boxes;
  }

  /* ── Iterative horizontal separation pass ──
     Find pairs of non-ancestor-related boxes that overlap horizontally
     and push their leaf nodes (and pills) apart until clean.
  */
  const leafDepts = [...new Set(nodes.map(n => n.dept))];

  function leafDescendantsOf(dept) {
    const kids = directChildDepts(dept);
    if (kids.length === 0) return leafDepts.includes(dept) ? [dept] : [];
    return kids.flatMap(leafDescendantsOf);
  }

  for (let pass = 0; pass < 60; pass++) {
    const boxes  = computeBoxes();
    const active = Object.keys(boxes);
    let moved    = false;

    for (let i = 0; i < active.length; i++) {
      for (let j = i+1; j < active.length; j++) {
        const da = active[i], db = active[j];
        if (isAncestorDept(da,db) || isAncestorDept(db,da) || da===db) continue;

        const ba = boxes[da], bb = boxes[db];
        // Only separate if they overlap horizontally (ignore pure vertical separation —
        // vertical is handled by rowY; horizontal overlap is the problem)
        const overlapX = Math.min(ba.x+ba.w, bb.x+bb.w) - Math.max(ba.x, bb.x) + BOX_SEP;
        if (overlapX <= 0) continue;
        // Also require they overlap vertically (otherwise they're just vertically stacked)
        const overlapY = Math.min(ba.y+ba.h, bb.y+bb.h) - Math.max(ba.y, bb.y);
        if (overlapY <= 0) continue;

        const half      = overlapX / 2;
        const leftDept  = (ba.x+ba.w/2) <= (bb.x+bb.w/2) ? da : db;
        const rightDept = leftDept === da ? db : da;

        const rightLeafs = leafDescendantsOf(rightDept).filter(d => !isAncestorDept(leftDept,d) && !isAncestorDept(d,leftDept));
        const leftLeafs  = leafDescendantsOf(leftDept).filter(d => !isAncestorDept(rightDept,d) && !isAncestorDept(d,rightDept));

        nodes.forEach(n => {
          if (rightLeafs.includes(n.dept)) n.x += half;
          if (leftLeafs.includes(n.dept))  n.x -= half;
        });

        // Move pills that belong to the shifted dept groups
        Object.keys(pillXOff).forEach(pd => {
          const inRight = pd===rightDept || isAncestorDept(rightDept,pd) || rightLeafs.includes(pd);
          const inLeft  = pd===leftDept  || isAncestorDept(leftDept,pd)  || leftLeafs.includes(pd);
          if (inRight) pillXOff[pd] += half;
          if (inLeft)  pillXOff[pd] -= half;
        });

        moved = true;
      }
    }
    if (!moved) break;
  }

  /* ── Re-centre parent nodes over their (shifted) children ── */
  const byId = Object.fromEntries(nodes.map(n=>[n.id,n]));
  for (let r = maxOrgRow-1; r >= 0; r--) {
    nodes.filter(n => n.row===r).forEach(parent => {
      const children = nodes.filter(n => n.parentId===parent.id);

      // Gather all visible child x-ranges: person cards + pill children of this dept
      const xs = children.flatMap(c => [c.x, c.x+NW]);
      directChildDepts(parent.dept).forEach(cd => {
        if (pillCols[cd] !== undefined) {
          const px = pillCols[cd]*(NW+COL_GAP) + (pillXOff[cd]||0) + (NW-PILL_W)/2;
          xs.push(px, px+PILL_W);
        }
      });

      if (xs.length === 0) return;
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      parent.x = (minX+maxX)/2 - NW/2;
    });
  }

  /* ── Final boxes ── */
  const deptBoxes = computeBoxes();
  return { nodes, deptBoxes };
}

/* ═══════════════════════════════════════════════════════════
   LINKS
   ═══════════════════════════════════════════════════════════ */
function buildLinks(nodes, deptBoxes, collapsedDepts) {
  const byId = Object.fromEntries(nodes.map(n=>[n.id,n]));

  function isDeptHidden(dept) {
    return !!(collapsedDepts[dept] || deptAncestors(dept).some(a=>collapsedDepts[a]));
  }

  const visibleIds = new Set(
    nodes.filter(n => !isDeptHidden(n.dept)).map(n=>n.id)
  );

  function effectiveAnchor(node, side) {
    if (visibleIds.has(node.id)) {
      return { key:String(node.id), x:node.x+NW/2, y:side==='bottom'?node.y+NH:node.y };
    }
    // Find the pill box for this node's collapsed dept chain
    const chain = [node.dept, ...deptAncestors(node.dept)];
    for (const d of chain) {
      if (collapsedDepts[d] && deptBoxes[d]) {
        const b=deptBoxes[d];
        return { key:d, x:b.x+b.w/2, y:side==='bottom'?b.y+b.h:b.y };
      }
    }
    return null;
  }

  const seen=new Set(), links=[];

  /* A) Person-node edges */
  nodes.forEach(n => {
    if (!n.parentId) return;
    const parent=byId[n.parentId];
    if (!parent) return;
    const ph=!visibleIds.has(parent.id), ch=!visibleIds.has(n.id);
    if (ph&&ch&&parent.dept===n.dept) return;
    const from=effectiveAnchor(parent,'bottom'), to=effectiveAnchor(n,'top');
    if (!from||!to||from.key===to.key) return;
    const key=`${from.key}→${to.key}`;
    if (seen.has(key)) return;
    seen.add(key);
    links.push({id:key, px:from.x, py:from.y, cx:to.x, cy:to.y, dashed:ph||ch});
  });

  /* B) Pill → parent dept box edges */
  Object.entries(deptBoxes).forEach(([dept, box]) => {
    if (!box.pill) return;
    // Find nearest expanded ancestor dept box
    for (const anc of deptAncestors(dept)) {
      if (!collapsedDepts[anc] && deptBoxes[anc] && !deptBoxes[anc].pill) {
        const pb = deptBoxes[anc];
        const key = `deptbox:${anc}→${dept}`;
        if (seen.has(key)) return;
        seen.add(key);
        links.push({ id:key,
          px: box.x+box.w/2, py: pb.y+BOX_TOP,
          cx: box.x+box.w/2, cy: box.y,
          dashed: true });
        break;
      }
    }
  });

  return links;
}

function elbowPath(px,py,cx,cy){
  const midY=py+(cy-py)/2;
  return `M${px},${py} L${px},${midY} L${cx},${midY} L${cx},${cy}`;
}

/* ═══════════════════════════════════════════════════════════
   NodeCard
   ═══════════════════════════════════════════════════════════ */
function NodeCard({data, onMouseEnter, onMouseLeave}){
  const ini=data.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
  return (
    <div className="card-shell w-full h-full bg-white rounded-md overflow-hidden select-none"
      style={{border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(15,23,42,0.08)"}}
      onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
      <div className="h-1 w-full bg-slate-200"/>
      <div className="flex items-center gap-2.5 px-3" style={{height:NH-4}}>
        <div className="flex-shrink-0 w-9 h-9 rounded-full bg-slate-100 border border-slate-200
                        flex items-center justify-center font-display font-bold text-slate-500"
          style={{fontSize:11}}>{ini}</div>
        <div className="flex-1 min-w-0">
          <p className="font-display font-bold text-slate-800 truncate leading-tight" style={{fontSize:12}}>{data.name}</p>
          <p className="text-slate-400 truncate leading-snug font-body" style={{fontSize:10,marginTop:2}}>
            {data.title.length>28?data.title.slice(0,27)+"…":data.title}</p>
          <p className="text-slate-300 font-body" style={{fontSize:9,marginTop:1}}>📍 {data.location}</p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DeptBox
   ═══════════════════════════════════════════════════════════ */
function DeptBox({dept, x, y, w, h, pill, onToggle}){
  const p=DEPT_COLOR[dept]||{bg:"#f8fafc",border:"#cbd5e1",label:"#475569"};
  const depth=deptDepth(dept);
  return (
    <foreignObject x={x} y={y} width={w} height={h} style={{overflow:"visible"}}>
      <div xmlns="http://www.w3.org/1999/xhtml" style={{width:w,height:h}}>
        <div style={{
          width:"100%", height:"100%",
          background:p.bg,
          border:`${!pill&&depth===0?2:1.5}px dashed ${p.border}`,
          borderRadius:pill?20:Math.max(4,10-depth),
          overflow:"hidden",
          boxShadow:pill?"0 2px 8px rgba(0,0,0,0.10)":"none",
        }}>
          <div className="flex items-center gap-1.5 select-none cursor-pointer"
            style={{padding:pill?"9px 12px":"8px 10px 6px 12px",height:"100%"}}
            onClick={onToggle}>
            <span style={{width:6,height:6,borderRadius:"50%",background:p.label,flexShrink:0,display:"inline-block"}}/>
            <span className="font-display font-bold uppercase truncate flex-1 min-w-0"
              style={{fontSize:9,color:p.label,letterSpacing:"0.12em"}}>{dept}</span>
            <span style={{fontSize:13,color:p.label,fontWeight:700,flexShrink:0,lineHeight:1}}>
              {pill?"+":" −"}
            </span>
          </div>
        </div>
      </div>
    </foreignObject>
  );
}

/* ═══════════════════════════════════════════════════════════
   Tooltip
   ═══════════════════════════════════════════════════════════ */
function Tooltip({tip}){
  const {show,x,y,d}=tip;
  const p=d?(DEPT_COLOR[d.dept]||{bg:"#f1f5f9",label:"#475569"}):{};
  return (
    <div id="tooltip"
      className={`bg-white border border-slate-200 rounded-lg shadow-xl px-4 py-3 font-body ${show?"show":""}`}
      style={{left:x,top:y,minWidth:170}}>
      {d&&<>
        <p className="font-display font-bold text-slate-800 text-sm mb-0.5">{d.name}</p>
        <p className="text-slate-400 text-xs mb-2">{d.title}</p>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="px-2 py-0.5 rounded text-xs font-semibold" style={{background:p.bg,color:p.label}}>{d.dept}</span>
          {DEPT_HIERARCHY[d.dept]&&<span className="text-slate-300 text-xs">within {DEPT_HIERARCHY[d.dept]}</span>}
          <span className="text-slate-400 text-xs">📍 {d.location}</span>
        </div>
      </>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   OrgChart
   ═══════════════════════════════════════════════════════════ */
function OrgChart(){
  const svgRef=useRef(null);
  const [svgTransform,setSvgTransform]=useState("");
  const [collapsedDepts,setCollapsedDepts]=useState({});
  const [tip,setTip]=useState({show:false,x:0,y:0,d:null});

  const {nodes,deptBoxes}=useMemo(()=>buildLayout(ORG,collapsedDepts),[collapsedDepts]);

  const links=useMemo(()=>buildLinks(nodes,deptBoxes,collapsedDepts),[nodes,deptBoxes,collapsedDepts]);

  const visibleNodes=useMemo(()=>
    nodes.filter(n=>!collapsedDepts[n.dept]&&!deptAncestors(n.dept).some(a=>collapsedDepts[a])),
    [nodes,collapsedDepts]
  );

  // Render order: expanded depts depth-ascending (parents behind children), then pills on top
  const renderOrder=useMemo(()=>{
    const expanded=Object.keys(deptBoxes).filter(d=>!deptBoxes[d].pill).sort((a,b)=>deptDepth(a)-deptDepth(b));
    const pills=Object.keys(deptBoxes).filter(d=>deptBoxes[d].pill);
    return [...expanded,...pills];
  },[deptBoxes]);

  useEffect(()=>{
    const svg=d3.select(svgRef.current);
    const W=svgRef.current.clientWidth;
    const zoom=d3.zoom().scaleExtent([0.1,2.5]).on("zoom",e=>setSvgTransform(e.transform.toString()));
    svg.call(zoom);
    svg.call(zoom.transform,d3.zoomIdentity.translate(W/2,48).scale(0.62));
  },[]);

  function toggleDept(dept){ setCollapsedDepts(p=>({...p,[dept]:!p[dept]})); }
  function expandAll(){ setCollapsedDepts({}); }
  function collapseAll(){
    const all={};
    directChildDepts("Executive").forEach(d=>{ all[d]=true; });
    setCollapsedDepts(all);
  }

  function buildLegendTree(dept,depth=0){
    const p=DEPT_COLOR[dept]||{label:"#475569"};
    const kids=directChildDepts(dept);
    return (
      <div key={dept}>
        <div className="flex items-center gap-2 mb-1.5" style={{paddingLeft:depth*12}}>
          <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{background:p.label}}/>
          <span className="text-slate-500 text-xs">{dept}</span>
        </div>
        {kids.map(c=>buildLegendTree(c,depth+1))}
      </div>
    );
  }
  const rootDepts=allDeptNames().filter(d=>!DEPT_HIERARCHY[d]);

  return (
    <div className="flex flex-col h-screen w-screen font-body" style={{background:"#f8fafc"}}>
      <header className="flex items-center justify-between px-8 py-3 bg-white border-b border-slate-200 shadow-sm flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded border border-slate-200 flex items-center justify-center bg-slate-50">
            <svg viewBox="0 0 20 20" className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="1.5">
              <rect x="7" y="1" width="6" height="5" rx="1"/>
              <rect x="1" y="13" width="6" height="5" rx="1"/>
              <rect x="13" y="13" width="6" height="5" rx="1"/>
              <line x1="10" y1="6" x2="10" y2="10"/>
              <line x1="4" y1="10" x2="16" y2="10"/>
              <line x1="4" y1="10" x2="4"  y2="13"/>
              <line x1="16" y1="10" x2="16" y2="13"/>
            </svg>
          </div>
          <div>
            <h1 className="font-display text-lg font-bold text-slate-800 leading-tight">Organisation Chart</h1>
            <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">Acme Corporation · 2025</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={expandAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Expand All
          </button>
          <button onClick={collapseAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Collapse All
          </button>
        </div>
      </header>

      <div className="chart-area flex-1 relative overflow-hidden">
        <svg ref={svgRef} className="chart-svg">
          <g transform={svgTransform}>

            {renderOrder.map(dept=>{
              const b=deptBoxes[dept];
              if(!b) return null;
              return <DeptBox key={dept} dept={dept} x={b.x} y={b.y} w={b.w} h={b.h}
                pill={b.pill} onToggle={()=>toggleDept(dept)}/>;
            })}

            {links.map(l=>(
              <path key={l.id} className={l.dashed?"link-path-dashed":"link-path"}
                d={elbowPath(l.px,l.py,l.cx,l.cy)}/>
            ))}

            {visibleNodes.map(n=>(
              <foreignObject key={n.id} x={n.x} y={n.y} width={NW} height={NH} style={{overflow:"visible"}}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{width:NW,height:NH}}>
                  <NodeCard data={n.data}
                    onMouseEnter={e=>setTip({show:true,x:e.clientX+14,y:e.clientY-10,d:n.data})}
                    onMouseLeave={()=>setTip(t=>({...t,show:false}))}/>
                </div>
              </foreignObject>
            ))}

          </g>
        </svg>

        <div className="absolute bottom-5 left-5 bg-white border border-slate-200 rounded-lg shadow-sm p-3.5">
          <p className="font-display font-bold text-slate-500 mb-2 uppercase tracking-widest" style={{fontSize:9}}>Departments</p>
          {rootDepts.map(d=>buildLegendTree(d,0))}
        </div>

        <div className="absolute bottom-5 right-5 flex flex-col items-end gap-1.5">
          {["Scroll · Zoom","Drag · Pan","Click dept label · Toggle"].map(h=>(
            <span key={h} className="bg-white border border-slate-200 rounded px-2.5 py-1 text-xs text-slate-400 shadow-sm">{h}</span>
          ))}
        </div>
      </div>

      <Tooltip tip={tip}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OrgChart/>);
</script>
</body>
</html>
