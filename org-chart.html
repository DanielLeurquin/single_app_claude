    .link-path-dashed { fill: none; stroke: #94a3b8; stroke-width: 1.5px; stroke-dasharray: 5 3; opacity: 0.55; }
    .card-shell { transition: box-shadow 0.15s, transform 0.15s; }
    .card-shell:hover { box-shadow: 0 6px 20px rgba(15,23,42,0.13) !important; transform: translateY(-1px); }
    #tooltip { position:fixed; pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:999; }
    #tooltip.show { opacity:1; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .chart-area { animation: fadeUp 0.35s ease both; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useRef, useState, useMemo } = React;

/* ═══════════════════════════════════════════════════════════
   DEPT HIERARCHY  childDept → parentDept
   ═══════════════════════════════════════════════════════════ */
const DEPT_HIERARCHY = {
  "Engineering"          : "Engineering-Security",
  "Security"             : "Engineering-Security",
  "Product"              : "Commercial",
  "Design"               : "Commercial",
  "Marketing"            : "Executive",
  "Finance"              : "Executive",
  "Engineering-Security" : "Executive",
  "Direction"            : "Executive",
  "Commercial"           : "Executive",
};

/* ═══════════════════════════════════════════════════════════
   ORG DATA
   ═══════════════════════════════════════════════════════════ */
const ORG = {

    { id:8, name:"Chris Okafor", title:"Head of Security", dept:"Security", location:"Austin",
      children:[

          children:[
            { id:11, name:"Mia Johansson", title:"Lead Visual Designer", dept:"Design", location:"London" },
            { id:12, name:"Ravi Sharma",   title:"Motion Designer",      dept:"Design", location:"Remote" },
          ]},
      ]},
    { id:5, name:"Olivia Grant", title:"CMO", dept:"Marketing", location:"Chicago",
      children:[
        { id:13, name:"Tyler Nguyen", title:"Growth Lead", dept:"Marketing", location:"Chicago",
          children:[
            { id:23, name:"Cara Diaz", title:"Growth Analyst", dept:"Marketing", location:"Chicago" },
            { id:24, name:"Ben Moore", title:"SEO Specialist", dept:"Marketing", location:"Remote"  },
          ]},
      ]},
    { id:6, name:"Nathan Adeyemi", title:"CFO", dept:"Finance", location:"San Francisco",
      children:[
        { id:25, name:"Isla Crawford", title:"Finance Director",  dept:"Finance", location:"San Francisco" },
        { id:26, name:"Roy Kim",       title:"Financial Analyst", dept:"Finance", location:"Remote"        },
      ]},
  ]
};

/* ═══════════════════════════════════════════════════════════
   HIERARCHY HELPERS
   ═══════════════════════════════════════════════════════════ */
function deptAncestors(dept) {
  const anc = [];
  let cur = DEPT_HIERARCHY[dept];
  while (cur) { anc.push(cur); cur = DEPT_HIERARCHY[cur]; }
  return anc;
}
function deptDepth(dept) { return deptAncestors(dept).length; }
function directChildren(parent) {
  return Object.entries(DEPT_HIERARCHY).filter(([,p])=>p===parent).map(([c])=>c);
}
function allDescendantDepts(dept) {
  const res = [];
  directChildren(dept).forEach(c => { res.push(c); res.push(...allDescendantDepts(c)); });
  return res;
}
function isAncestorOf(ancestor, dept) { return deptAncestors(dept).includes(ancestor); }

function allDeptNames() {
  const leaf    = [];
  function walk(n) { if(!leaf.includes(n.dept)) leaf.push(n.dept); (n.children||[]).forEach(walk); }
  walk(ORG);
  const parents = Object.values(DEPT_HIERARCHY);
  return [...new Set([...leaf, ...parents])];
}

/* ═══════════════════════════════════════════════════════════
   DEPT COLOURS
   ═══════════════════════════════════════════════════════════ */
function buildDeptColors() {
  const depts  = allDeptNames();
  const GOLDEN = 137.5, START = 210;
  const map = {};
  depts.forEach((dept, i) => {
    const h   = (START + i * GOLDEN) % 360;
    const dep = deptDepth(dept);
    const bgL = Math.max(90, 97 - dep * 3);
    map[dept] = {
      bg:     `hsl(${h},55%,${bgL}%)`,
      border: `hsl(${h},55%,72%)`,
      label:  `hsl(${h},70%,28%)`,
    };
  });
  return map;
}
const DEPT_COLOR = buildDeptColors();

/* ═══════════════════════════════════════════════════════════
   LAYOUT CONSTANTS
   ═══════════════════════════════════════════════════════════ */
const NW       = 200;
const NH       = 76;
const H_GAP    = 30;
const V_GAP    = 56;
const BOX_PAD  = 22;   // padding inside a dept box around its content
const BOX_TOP  = 36;   // label bar height
const BOX_SEP  = 16;   // minimum gap between non-related leaf boxes
const PILL_W   = 160;
const PILL_H   = BOX_TOP;
const PILL_GAP = 10;
// Extra padding added per nesting level so parent borders are clearly visible
const NEST_PAD = 20;

/* ═══════════════════════════════════════════════════════════
   STEP 1 — D3 tree layout (positions person cards)
   ═══════════════════════════════════════════════════════════ */
function runD3Layout(orgNode) {
  const root = d3.hierarchy(orgNode);
  d3.tree().nodeSize([NW + H_GAP, NH + V_GAP])
    .separation((a,b) => a.parent===b.parent ? 1 : 1.3)(root);
  const nodes = [];
  root.each(d => nodes.push({
    id:       d.data.id,
    parentId: d.parent ? d.parent.data.id : null,
    dept:     d.data.dept,
    x:        d.x - NW/2,
    y:        d.y,
    data:     d.data,
    depth:    d.depth,
  }));
  return nodes;
}

/* ═══════════════════════════════════════════════════════════
   STEP 2 — Separate leaf-dept boxes horizontally
   so non-related depts have at least BOX_SEP gap.
   Only leaf (person-containing) depts are pushed.
   Parent depts are re-measured later.
   ═══════════════════════════════════════════════════════════ */
function separateLeafBoxes(nodes) {
  const xs = {};
  nodes.forEach(n => { xs[n.id] = 0; });

  const leafDepts = [...new Set(nodes.map(n => n.dept))];

  function getLeafBox(dept) {
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    nodes.forEach(n => {
      if (n.dept !== dept) return;
      const nx = n.x + xs[n.id];
      minX=Math.min(minX,nx); minY=Math.min(minY,n.y);
      maxX=Math.max(maxX,nx+NW); maxY=Math.max(maxY,n.y+NH);
    });
    if (!isFinite(minX)) return null;
    return { x:minX-BOX_PAD, y:minY-BOX_TOP, w:(maxX-minX)+BOX_PAD*2, h:(maxY-minY)+BOX_TOP+BOX_PAD };
  }

  function rectsOverlap(a,b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  for (let pass=0; pass<60; pass++) {
    let moved = false;
    for (let i=0; i<leafDepts.length; i++) {
      for (let j=i+1; j<leafDepts.length; j++) {
        const da=leafDepts[i], db=leafDepts[j];
        // Skip if one is ancestor of the other — overlap is intentional
        if (isAncestorOf(da,db) || isAncestorOf(db,da)) continue;
        const ba=getLeafBox(da), bb=getLeafBox(db);
        if (!ba||!bb) continue;
        // Add BOX_SEP gap requirement
        const gapBa = { ...ba, x:ba.x-BOX_SEP/2, w:ba.w+BOX_SEP };
        const gapBb = { ...bb, x:bb.x-BOX_SEP/2, w:bb.w+BOX_SEP };
        if (!rectsOverlap(gapBa, gapBb)) continue;
        const overlapX = Math.min(gapBa.x+gapBa.w, gapBb.x+gapBb.w) - Math.max(gapBa.x, gapBb.x);
        const half = overlapX / 2;
        const [left, right] = (ba.x+ba.w/2)<=(bb.x+bb.w/2) ? [da,db] : [db,da];
        nodes.forEach(n => {
          if (n.dept===right) xs[n.id] += half;
          if (n.dept===left)  xs[n.id] -= half;
        });
        moved = true;
      }
    }
    if (!moved) break;
  }
  return nodes.map(n => ({ ...n, x: n.x + xs[n.id] }));
}

/* ═══════════════════════════════════════════════════════════
   STEP 3 — Compute static bounding boxes for ALL depts
   (leaf depts from card positions; parent depts by enclosing
    their children bottom-up with NEST_PAD extra per level).
   ═══════════════════════════════════════════════════════════ */
function computeStaticBoxes(nodes) {
  // Leaf boxes
  const boxes = {};
  const leafDepts = [...new Set(nodes.map(n=>n.dept))];
  leafDepts.forEach(dept => {
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    nodes.forEach(n => {
      if (n.dept!==dept) return;
      minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
      maxX=Math.max(maxX,n.x+NW); maxY=Math.max(maxY,n.y+NH);
    });
    if (!isFinite(minX)) return;
    boxes[dept] = { x:minX-BOX_PAD, y:minY-BOX_TOP, w:(maxX-minX)+BOX_PAD*2, h:(maxY-minY)+BOX_TOP+BOX_PAD };
  });

  // Parent boxes: bottom-up expansion
  const allD = allDeptNames();
  const sorted = [...allD].sort((a,b) => deptDepth(b)-deptDepth(a)); // deepest first
  sorted.forEach(dept => {
    const parent = DEPT_HIERARCHY[dept];
    if (!parent || !boxes[dept]) return;
    const pad = NEST_PAD;
    const cb = boxes[dept];
    if (!boxes[parent]) {
      boxes[parent] = { x:cb.x-pad, y:cb.y-BOX_TOP-pad, w:cb.w+pad*2, h:cb.h+BOX_TOP+pad*2 };
    } else {
      const pb = boxes[parent];
      const nx = Math.min(pb.x, cb.x-pad);
      const ny = Math.min(pb.y, cb.y-pad);
      const nr = Math.max(pb.x+pb.w, cb.x+cb.w+pad);
      const nb = Math.max(pb.y+pb.h, cb.y+cb.h+pad);
      boxes[parent] = { x:nx, y:ny, w:nr-nx, h:nb-ny };
    }
  });

  return boxes;
}

/* ═══════════════════════════════════════════════════════════
   STEP 4 — Compute DISPLAY boxes for the current collapse state.

   Key invariants:
   A) A collapsed dept is always rendered as a pill INSIDE its
      parent box. Pills for sibling depts are laid out as a
      left-to-right row, centred inside the parent content area.
   B) An expanded dept's box is re-measured from its visible
      contents (person cards + child dept display boxes).
   C) Parent boxes are always re-measured after their children
      are finalised, so they correctly enclose everything.
   D) A dept whose own ancestor is collapsed is not rendered at
      all — the ancestor pill represents the whole subtree.
   ═══════════════════════════════════════════════════════════ */
function computeDisplayBoxes(staticBoxes, nodes, collapsedDepts) {
  // Which dept is the "effective container" — the first collapsed
  // ancestor (or the dept itself if it is collapsed).
  function collapsedAncestor(dept) {
    if (collapsedDepts[dept]) return dept;
    for (const anc of deptAncestors(dept)) {
      if (collapsedDepts[anc]) return anc;
    }
    return null;
  }

  const allD = allDeptNames();
  // Deepest first for bottom-up; shallowest first for top-down
  const byDepth = [...allD].sort((a,b)=>deptDepth(b)-deptDepth(a));
  const byShallow = [...byDepth].reverse();

  // display[dept] = { x, y, w, h, pill }
  const display = {};

  // ── Pass 1 (top-down): position collapsed dept pills inside their parent.
  //    We go shallow-first so parent geometry is available before children.
  byShallow.forEach(dept => {
    if (!collapsedDepts[dept]) return;
    // Only position if this dept's own parent is NOT collapsed
    // (if parent is collapsed, this dept is hidden entirely)
    const parent = DEPT_HIERARCHY[dept];
    if (parent && collapsedDepts[parent]) return;
    if (parent && collapsedAncestor(parent)) return;
    // We'll position it in Pass 2 once we know siblings; mark as pill for now
    display[dept] = { pill: true, x:0, y:0, w:PILL_W, h:PILL_H };
  });

  // ── Pass 2 (top-down): for each EXPANDED dept, lay out its collapsed
  //    direct children as a horizontal pill row inside it.
  byShallow.forEach(parent => {
    if (collapsedDepts[parent]) return;
    if (collapsedAncestor(parent)) return; // parent is hidden

    const collapsedKids = directChildren(parent).filter(c => collapsedDepts[c]);
    if (collapsedKids.length === 0) return;

    // Anchor the pill row vertically: use the top of the parent's static box
    // content area (just below the label bar) + a small top offset
    const parentStatic = staticBoxes[parent];
    const rowY = parentStatic
      ? parentStatic.y + BOX_TOP + NEST_PAD
      : 0;

    // Centre the pill row on the static horizontal centre of the parent
    const parentCX = parentStatic
      ? parentStatic.x + parentStatic.w / 2
      : 0;

    const totalW = collapsedKids.length * PILL_W + (collapsedKids.length-1) * PILL_GAP;
    const startX = parentCX - totalW/2;

    collapsedKids.forEach((kid, i) => {
      display[kid] = {
        pill: true,
        x: startX + i*(PILL_W+PILL_GAP),
        y: rowY,
        w: PILL_W,
        h: PILL_H,
      };
    });
  });

  // ── Pass 3 (bottom-up): measure expanded depts from their contents.
  byDepth.forEach(dept => {
    if (collapsedDepts[dept]) return;
    if (collapsedAncestor(dept)) return; // hidden

    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;

    // Own person cards
    nodes.forEach(n => {
      if (n.dept!==dept) return;
      minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
      maxX=Math.max(maxX,n.x+NW); maxY=Math.max(maxY,n.y+NH);
    });

    // Child dept display boxes (only direct children)
    directChildren(dept).forEach(child => {
      const cb = display[child];
      if (!cb) return;
      minX=Math.min(minX,cb.x); minY=Math.min(minY,cb.y);
      maxX=Math.max(maxX,cb.x+cb.w); maxY=Math.max(maxY,cb.y+cb.h);
    });

    if (!isFinite(minX)) return;

    display[dept] = {
      pill: false,
      x:  minX - BOX_PAD,
      y:  minY - BOX_TOP,
      w:  (maxX-minX) + BOX_PAD*2,
      h:  (maxY-minY) + BOX_TOP + BOX_PAD,
    };
  });

  return display;
}

/* ═══════════════════════════════════════════════════════════
   LINKS — reroute through display boxes when nodes hidden
   ═══════════════════════════════════════════════════════════ */
function buildLinks(allNodes, visibleIds, displayBoxes, collapsedDepts) {
  const nodeById = Object.fromEntries(allNodes.map(n=>[n.id,n]));

  // The display box that represents a hidden node's dept
  function effectiveBox(dept) {
    // Walk up until we find a dept that has a display box and is collapsed,
    // or the dept itself has a display box
    if (displayBoxes[dept]) return { key:dept, box:displayBoxes[dept] };
    for (const anc of deptAncestors(dept)) {
      if (displayBoxes[anc]) return { key:anc, box:displayBoxes[anc] };
    }
    return null;
  }

  function anchor(node, side) {
    if (visibleIds.has(node.id)) {
      return { key:String(node.id), x:node.x+NW/2, y:side==='bottom'?node.y+NH:node.y };
    }
    const eff = effectiveBox(node.dept);
    if (!eff) return null;
    const {key,box} = eff;
    return { key, x:box.x+box.w/2, y:side==='bottom'?box.y+box.h:box.y };
  }

  const seen=new Set(), links=[];
  allNodes.forEach(n => {
    if (n.parentId===null) return;
    const parent = nodeById[n.parentId];
    if (!parent) return;
    const ph = !visibleIds.has(parent.id);
    const ch = !visibleIds.has(n.id);
    if (ph && ch && parent.dept===n.dept) return;
    const from=anchor(parent,'bottom'), to=anchor(n,'top');
    if (!from||!to||from.key===to.key) return;
    const key=`${from.key}→${to.key}`;
    if (seen.has(key)) return;
    seen.add(key);
    links.push({ id:key, px:from.x, py:from.y, cx:to.x, cy:to.y, dashed:ph||ch });
  });
  return links;
}

function elbowPath(px,py,cx,cy) {
  const midY = py+(cy-py)/2;
  return `M${px},${py} L${px},${midY} L${cx},${midY} L${cx},${cy}`;
}

/* ═══════════════════════════════════════════════════════════
   VISIBILITY
   A node is hidden if its dept or any ancestor dept is collapsed.
   ═══════════════════════════════════════════════════════════ */
function isDeptVisible(dept, collapsedDepts) {
  if (collapsedDepts[dept]) return false;
  return !deptAncestors(dept).some(a => collapsedDepts[a]);
}

/* Render order for dept boxes:
   1. Expanded depts, parents before children (depth ascending)
   2. Collapsed (pill) depts last — always on top so they're never hidden
      behind an expanded sibling box                                       */
function getRenderOrder(displayBoxes, collapsedDepts) {
  const expanded = Object.keys(displayBoxes)
    .filter(d => !displayBoxes[d].pill)
    .sort((a,b) => deptDepth(a)-deptDepth(b));
  const pills = Object.keys(displayBoxes)
    .filter(d => displayBoxes[d].pill);
  return [...expanded, ...pills];
}

/* ═══════════════════════════════════════════════════════════
   NodeCard
   ═══════════════════════════════════════════════════════════ */
function NodeCard({ data, onMouseEnter, onMouseLeave }) {
  return (
    <div className="card-shell w-full h-full bg-white rounded-md overflow-hidden select-none"
      style={{ border:"1px solid #e2e8f0", boxShadow:"0 1px 4px rgba(15,23,42,0.08)" }}
      onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
      <div className="h-1 w-full bg-slate-200"/>
      <div className="flex items-center gap-2.5 px-3" style={{ height:NH-4 }}>
        <div className="flex-shrink-0 w-9 h-9 rounded-full bg-slate-100 border border-slate-200
                        flex items-center justify-center font-display font-bold text-slate-500"
          style={{ fontSize:11 }}>
          {data.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}
        </div>
        <div className="flex-1 min-w-0">
          <p className="font-display font-bold text-slate-800 truncate leading-tight" style={{ fontSize:12 }}>
            {data.name}
          </p>
          <p className="text-slate-400 truncate leading-snug font-body" style={{ fontSize:10, marginTop:2 }}>
            {data.title.length>28 ? data.title.slice(0,27)+"…" : data.title}
          </p>
          <p className="text-slate-300 font-body" style={{ fontSize:9, marginTop:1 }}>📍 {data.location}</p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DeptBox  — expanded or pill
   ═══════════════════════════════════════════════════════════ */
function DeptBox({ dept, x, y, w, h, pill, depth, onToggle }) {
  const p = DEPT_COLOR[dept] || { bg:"#f8fafc", border:"#cbd5e1", label:"#475569" };
  return (
    <foreignObject x={x} y={y} width={w} height={h} style={{ overflow:"visible" }}>
      <div xmlns="http://www.w3.org/1999/xhtml" style={{ width:w, height:h }}>
        <div style={{
          width:"100%", height:"100%",
          background: p.bg,
          border:`${depth===0&&!pill ? 2 : 1.5}px dashed ${p.border}`,
          borderRadius: pill ? 20 : Math.max(4, 10-depth),
          overflow:"hidden",
          boxShadow: pill ? "0 2px 8px rgba(0,0,0,0.10)" : "none",
        }}>
          <div className="flex items-center gap-1.5 select-none cursor-pointer"
            style={{ padding: pill ? "9px 12px" : "8px 10px 6px 12px", height:"100%" }}
            onClick={onToggle}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:p.label, flexShrink:0, display:"inline-block" }}/>
            <span className="font-display font-bold uppercase truncate flex-1 min-w-0"
              style={{ fontSize:9, color:p.label, letterSpacing:"0.12em" }}>
              {dept}
            </span>
            <span style={{ fontSize:13, color:p.label, fontWeight:700, flexShrink:0, lineHeight:1 }}>
              {pill ? "+" : "−"}
            </span>
          </div>
        </div>
      </div>
    </foreignObject>
  );
}

/* ═══════════════════════════════════════════════════════════
   Tooltip
   ═══════════════════════════════════════════════════════════ */
function Tooltip({ tip }) {
  const { show, x, y, d } = tip;
  const p = d ? (DEPT_COLOR[d.dept]||{bg:"#f1f5f9",label:"#475569"}) : {};
  return (
    <div id="tooltip"
      className={`bg-white border border-slate-200 rounded-lg shadow-xl px-4 py-3 font-body ${show?"show":""}`}
      style={{ left:x, top:y, minWidth:170 }}>
      {d && <>
        <p className="font-display font-bold text-slate-800 text-sm mb-0.5">{d.name}</p>
        <p className="text-slate-400 text-xs mb-2">{d.title}</p>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="px-2 py-0.5 rounded text-xs font-semibold" style={{ background:p.bg, color:p.label }}>{d.dept}</span>
          {DEPT_HIERARCHY[d.dept] && <span className="text-slate-300 text-xs">within {DEPT_HIERARCHY[d.dept]}</span>}
          <span className="text-slate-400 text-xs">📍 {d.location}</span>
        </div>
      </>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   OrgChart
   ═══════════════════════════════════════════════════════════ */
function OrgChart() {
  const svgRef = useRef(null);
  const [svgTransform, setSvgTransform] = useState("");
  const [collapsedDepts, setCollapsedDepts] = useState({});
  const [tip, setTip] = useState({ show:false, x:0, y:0, d:null });

  /* Static layout — computed once */
  const allNodes = useMemo(() => {
    const raw = runD3Layout(ORG);
    return separateLeafBoxes(raw);
  }, []);
  const staticBoxes = useMemo(() => computeStaticBoxes(allNodes), [allNodes]);

  /* Dynamic display boxes — updated when collapse state changes */
  const displayBoxes = useMemo(
    () => computeDisplayBoxes(staticBoxes, allNodes, collapsedDepts),
    [staticBoxes, allNodes, collapsedDepts]
  );

  const renderOrder = useMemo(
    () => getRenderOrder(displayBoxes, collapsedDepts),
    [displayBoxes, collapsedDepts]
  );

  const visibleNodes = useMemo(
    () => allNodes.filter(n => isDeptVisible(n.dept, collapsedDepts)),
    [allNodes, collapsedDepts]
  );
  const visibleIds = useMemo(() => new Set(visibleNodes.map(n=>n.id)), [visibleNodes]);

  const links = useMemo(
    () => buildLinks(allNodes, visibleIds, displayBoxes, collapsedDepts),
    [allNodes, visibleIds, displayBoxes, collapsedDepts]
  );

  /* D3 zoom */
  useEffect(() => {
    const svg = d3.select(svgRef.current);
    const W   = svgRef.current.clientWidth;
    const zoom = d3.zoom().scaleExtent([0.1,2.5])
      .on("zoom", e => setSvgTransform(e.transform.toString()));
    svg.call(zoom);
    svg.call(zoom.transform, d3.zoomIdentity.translate(W/2, 48).scale(0.58));
  }, []);

  function toggleDept(dept) { setCollapsedDepts(p => ({ ...p, [dept]: !p[dept] })); }
  function expandAll()  { setCollapsedDepts({}); }
  function collapseAll() {
    const all = {};
    // Only collapse leaf-level depts (the deepest ones), not parents —
    // parent depts auto-shrink when all their children collapse
    allDeptNames().forEach(d => { all[d] = true; });
    setCollapsedDepts(all);
  }

  function buildLegendTree(dept, depth=0) {
    const p = DEPT_COLOR[dept]||{label:"#475569"};
    const kids = directChildren(dept);
    return (
      <div key={dept}>
        <div className="flex items-center gap-2 mb-1.5" style={{ paddingLeft:depth*12 }}>
          <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background:p.label }}/>
          <span className="text-slate-500 text-xs">{dept}</span>
        </div>
        {kids.map(c => buildLegendTree(c, depth+1))}
      </div>
    );
  }
  const rootDepts = allDeptNames().filter(d => !DEPT_HIERARCHY[d]);

  return (
    <div className="flex flex-col h-screen w-screen font-body" style={{ background:"#f8fafc" }}>
      <header className="flex items-center justify-between px-8 py-3 bg-white border-b border-slate-200 shadow-sm flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded border border-slate-200 flex items-center justify-center bg-slate-50">
            <svg viewBox="0 0 20 20" className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="1.5">
              <rect x="7" y="1" width="6" height="5" rx="1"/>
              <rect x="1" y="13" width="6" height="5" rx="1"/>
              <rect x="13" y="13" width="6" height="5" rx="1"/>
              <line x1="10" y1="6"  x2="10" y2="10"/>
              <line x1="4"  y1="10" x2="16" y2="10"/>
              <line x1="4"  y1="10" x2="4"  y2="13"/>
              <line x1="16" y1="10" x2="16" y2="13"/>
            </svg>
          </div>
          <div>
            <h1 className="font-display text-lg font-bold text-slate-800 leading-tight">Organisation Chart</h1>
            <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">Acme Corporation · 2025</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={expandAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Expand All
          </button>
          <button onClick={collapseAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Collapse All
          </button>
        </div>
      </header>

      <div className="chart-area flex-1 relative overflow-hidden">
        <svg ref={svgRef} className="chart-svg">
          <g transform={svgTransform}>

            {renderOrder.map(dept => {
              const b = displayBoxes[dept];
              if (!b) return null;
              return (
                <DeptBox key={dept} dept={dept}
                  x={b.x} y={b.y} w={b.w} h={b.h}
                  pill={b.pill}
                  depth={deptDepth(dept)}
                  onToggle={() => toggleDept(dept)}
                />
              );
            })}

            {links.map(l => (
              <path key={l.id} className={l.dashed?"link-path-dashed":"link-path"}
                d={elbowPath(l.px,l.py,l.cx,l.cy)}/>
            ))}

            {visibleNodes.map(n => (
              <foreignObject key={n.id} x={n.x} y={n.y} width={NW} height={NH} style={{ overflow:"visible" }}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{ width:NW, height:NH }}>
                  <NodeCard data={n.data}
                    onMouseEnter={e=>setTip({show:true,x:e.clientX+14,y:e.clientY-10,d:n.data})}
                    onMouseLeave={()=>setTip(t=>({...t,show:false}))}/>
                </div>
              </foreignObject>
            ))}

          </g>
        </svg>

        <div className="absolute bottom-5 left-5 bg-white border border-slate-200 rounded-lg shadow-sm p-3.5">
          <p className="font-display font-bold text-slate-500 mb-2 uppercase tracking-widest" style={{ fontSize:9 }}>Departments</p>
          {rootDepts.map(d => buildLegendTree(d,0))}
        </div>

        <div className="absolute bottom-5 right-5 flex flex-col items-end gap-1.5">
          {["Scroll · Zoom","Drag · Pan","Click dept label · Toggle"].map(h=>(
            <span key={h} className="bg-white border border-slate-200 rounded px-2.5 py-1 text-xs text-slate-400 shadow-sm">{h}</span>
          ))}
        </div>
      </div>

      <Tooltip tip={tip}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OrgChart/>);
</script>
</body>
</html>
