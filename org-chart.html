/* ═══════════════════════════════════════════
   DEPT COLOURS — generated dynamically from
   whatever departments exist in the ORG tree.

   Algorithm:
   1. Walk the tree to collect unique dept names
      in the order they first appear (BFS).
   2. Space hues evenly around the colour wheel,
      starting at 210° (calm blue) and stepping
      by the golden-angle-derived offset so
      adjacent depts are maximally distinct.
   3. From each hue derive:
      - bg     : very light tint  (s 60%, l 96%)
      - border : soft mid tone    (s 70%, l 78%)
      - label  : dark saturated   (s 80%, l 32%)
   ═══════════════════════════════════════════ */

function collectDepts(node, seen = [], order = []) {
  if (!seen.includes(node.dept)) {
    seen.push(node.dept);
    order.push(node.dept);
  }
  (node.children || []).forEach(c => collectDepts(c, seen, order));
  return order;
}

function hsl(h, s, l) {
  return `hsl(${h},${s}%,${l}%)`;
}

function buildDeptColors(orgRoot) {
  const depts = collectDepts(orgRoot);
  const n = depts.length;
  // Golden-angle step in degrees keeps successive hues far apart
  const GOLDEN_STEP = 137.5;
  const START_HUE   = 210;

  const map = {};
  depts.forEach((dept, i) => {
    const h = (START_HUE + i * GOLDEN_STEP) % 360;
    map[dept] = {
      bg:     hsl(h, 60,  96),
      border: hsl(h, 55,  78),
      label:  hsl(h, 70,  30),
    };
  });
  return map;
}

const DEPT_COLOR = buildDeptColors(ORG);

/* ═══════════════════════════════════════════
   LAYOUT CONSTANTS
   ═══════════════════════════════════════════ */
const NW       = 200;  // card width
const NH       = 76;   // card height
const H_GAP    = 30;   // horizontal gap between sibling cards
const V_GAP    = 56;   // vertical gap between levels
const BOX_PAD  = 22;   // inner padding of dept box (sides + bottom)
const BOX_TOP  = 36;   // height of dept box label area at top

/* ═══════════════════════════════════════════
   STEP 1 — Run D3 tree layout on full tree
   (ignoring dept collapse for positioning —
    we hide cards separately)
   ═══════════════════════════════════════════ */
function runD3Layout(orgNode) {
  const root = d3.hierarchy(orgNode);
  d3.tree()
    .nodeSize([NW + H_GAP, NH + V_GAP])
    .separation((a, b) => a.parent === b.parent ? 1 : 1.3)
    (root);
  // Return flat list of {id, x, y, depth, data, parentId}
  const nodes = [];
  root.each(d => {
    nodes.push({
      id:       d.data.id,
      parentId: d.parent ? d.parent.data.id : null,
      dept:     d.data.dept,
      x:        d.x - NW / 2,
      y:        d.y,
      data:     d.data,
      depth:    d.depth,
    });
  });
  return nodes;
}

/* ═══════════════════════════════════════════
   STEP 2a — Raw bounding box per dept
   ═══════════════════════════════════════════ */
function computeRawBoxes(nodes) {
  const bounds = {};
  nodes.forEach(n => {
    const d = n.dept;
    if (!bounds[d]) bounds[d] = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
    const b = bounds[d];
    b.minX = Math.min(b.minX, n.x);
    b.minY = Math.min(b.minY, n.y);
    b.maxX = Math.max(b.maxX, n.x + NW);
    b.maxY = Math.max(b.maxY, n.y + NH);
  });
  const boxes = {};
  Object.entries(bounds).forEach(([dept, b]) => {
    boxes[dept] = {
      dept,
      x: b.minX - BOX_PAD,
      y: b.minY - BOX_TOP,
      w: (b.maxX - b.minX) + BOX_PAD * 2,
      h: (b.maxY - b.minY) + BOX_TOP + BOX_PAD,
    };
  });
  return boxes;
}

/* ═══════════════════════════════════════════
   STEP 2b — Separate non-nested overlapping
   dept boxes by shifting their nodes sideways.
   Minimum gap between non-nested box borders.
   ═══════════════════════════════════════════ */
const BOX_SEP = 14;

function separateBoxes(nodes) {
  const xs = {};
  nodes.forEach(n => { xs[n.id] = 0; });

  function getBox(dept) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodes.forEach(n => {
      if (n.dept !== dept) return;
      const nx = n.x + xs[n.id];
      minX = Math.min(minX, nx);
      minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, nx + NW);
      maxY = Math.max(maxY, n.y + NH);
    });
    if (minX === Infinity) return null;
    return { x: minX - BOX_PAD, y: minY - BOX_TOP, w: (maxX-minX)+BOX_PAD*2, h: (maxY-minY)+BOX_TOP+BOX_PAD };
  }

  function overlaps(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function contains(outer, inner) {
    return outer.x <= inner.x && outer.y <= inner.y &&
           outer.x + outer.w >= inner.x + inner.w &&
           outer.y + outer.h >= inner.y + inner.h;
  }

  const depts = [...new Set(nodes.map(n => n.dept))];

  for (let pass = 0; pass < 40; pass++) {
    let anyMoved = false;
    for (let i = 0; i < depts.length; i++) {
      for (let j = i + 1; j < depts.length; j++) {
        const da = depts[i], db = depts[j];
        const ba = getBox(da), bb = getBox(db);
        if (!ba || !bb || !overlaps(ba, bb)) continue;
        if (contains(ba, bb) || contains(bb, ba)) continue;

        // Horizontal overlap to resolve
        const overlapX = Math.min(ba.x + ba.w, bb.x + bb.w) - Math.max(ba.x, bb.x) + BOX_SEP;
        const half = overlapX / 2;

        const caX = ba.x + ba.w / 2;
        const cbX = bb.x + bb.w / 2;
        const [leftDept, rightDept] = caX <= cbX ? [da, db] : [db, da];

        nodes.forEach(n => {
          if (n.dept === rightDept) xs[n.id] += half;
          if (n.dept === leftDept)  xs[n.id] -= half;
        });
        anyMoved = true;
      }
    }
    if (!anyMoved) break;
  }

  return nodes.map(n => ({ ...n, x: n.x + xs[n.id] }));
}

/* ═══════════════════════════════════════════
   STEP 2 — Full pipeline
   ═══════════════════════════════════════════ */
function computeDeptBoxes(nodes) {
  return computeRawBoxes(nodes);
}

/* ═══════════════════════════════════════════
   STEP 3 — Build links, rerouting through dept
   box edges when a node is hidden (collapsed).

   Rules:
   - If both parent & child are visible → normal card-to-card link
   - If child is hidden (its dept collapsed) → link goes to top-centre
     of the child's dept box (the collapsed label bar)
   - If parent is hidden (its dept collapsed) → link starts from
     bottom-centre of the parent's dept box
   - If BOTH are hidden in the SAME dept → skip (internal link, dept box handles it)
   - If BOTH are hidden in DIFFERENT depts → show dept-box to dept-box link
   - Deduplicate: one link per unique (sourceDept-or-id → targetDept-or-id) pair
   ═══════════════════════════════════════════ */
function buildLinks(allNodes, visibleIds, allBoxes, collapsedDepts) {
  const nodeById = Object.fromEntries(allNodes.map(n => [n.id, n]));

  // Helper: resolve the "anchor" for a node.
  // If visible → its card centre-top/bottom.
  // If hidden  → the dept box edge.
  function resolveAnchor(node, side /* 'bottom'|'top' */) {
    if (visibleIds.has(node.id)) {
      return {
        key: String(node.id),
        x: node.x + NW / 2,
        y: side === 'bottom' ? node.y + NH : node.y,
      };
    }
    // node is hidden — use its dept box
    const box = allBoxes[node.dept];
    if (!box) return null;
    const cx = box.x + box.w / 2;
    return {
      key: node.dept,
      x: cx,
      y: side === 'bottom' ? box.y + BOX_TOP : box.y, // collapsed box height = BOX_TOP
    };
  }

  const seen = new Set();
  const links = [];

  allNodes.forEach(n => {
    if (n.parentId === null) return;
    const parent = nodeById[n.parentId];
    if (!parent) return;

    const parentHidden = !visibleIds.has(parent.id);
    const childHidden  = !visibleIds.has(n.id);

    // Both hidden AND same dept → purely internal, skip
    if (parentHidden && childHidden && parent.dept === n.dept) return;

    const from = resolveAnchor(parent, 'bottom');
    const to   = resolveAnchor(n,      'top');
    if (!from || !to) return;

    // Skip self-loops (both collapsed into the same dept box)
    if (from.key === to.key) return;

    const dedupKey = `${from.key}→${to.key}`;
    if (seen.has(dedupKey)) return;
    seen.add(dedupKey);

    links.push({
      id:  dedupKey,
      px:  from.x,
      py:  from.y,
      cx:  to.x,
      cy:  to.y,
      dashed: parentHidden || childHidden, // style differently when rerouted
    });
  });

  return links;
}

function elbowPath(px, py, cx, cy) {
  const midY = py + (cy - py) / 2;
  return `M${px},${py} L${px},${midY} L${cx},${midY} L${cx},${cy}`;
}

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
function initials(name) { return name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase(); }
function clip(s, n) { return s.length > n ? s.slice(0,n-1)+"…" : s; }

/* Which dept boxes contain which other dept boxes?
   Used to layer them correctly (outer box behind inner box).
   Returns sorted dept list: outermost first.            */
function sortDeptsByNesting(boxes) {
  const depts = Object.keys(boxes);
  return depts.sort((a, b) => {
    const ba = boxes[a], bb = boxes[b];
    // a is "outer" if it contains b
    const aContainsB = ba.x <= bb.x && ba.y <= bb.y &&
      ba.x + ba.w >= bb.x + bb.w && ba.y + ba.h >= bb.y + bb.h;
    const bContainsA = bb.x <= ba.x && bb.y <= ba.y &&
      bb.x + bb.w >= ba.x + ba.w && bb.y + bb.h >= ba.y + ba.h;
    if (aContainsB) return -1;
    if (bContainsA) return  1;
    return 0;
  });
}

   ═══════════════════════════════════════════ */

          style={{ fontSize:11 }}>
          {initials(data.name)}

        <div className="flex-1 min-w-0">
          <p className="font-display font-bold text-slate-800 truncate leading-tight" style={{ fontSize:12 }}>

          </p>
          <p className="text-slate-300 font-body" style={{ fontSize:9, marginTop:1 }}>

          </p>

      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   DeptBox
   ═══════════════════════════════════════════ */
function DeptBox({ dept, x, y, w, h, collapsed, onToggle }) {
  const p = DEPT_COLOR[dept] || { bg:"#f8fafc", border:"#cbd5e1", label:"#475569" };
  const displayH = collapsed ? BOX_TOP : h;
  return (
    <foreignObject x={x} y={y} width={w} height={displayH} style={{ overflow:"visible" }}>
      <div xmlns="http://www.w3.org/1999/xhtml" style={{ width:w, height:displayH }}>
        <div style={{
          width:"100%", height:"100%",
          background: collapsed ? "transparent" : p.bg,
          border:`1.5px dashed ${p.border}`,
          borderRadius:10,
          overflow:"hidden",
        }}>
          {/* Label row */}
          <div className="flex items-center gap-1.5 select-none cursor-pointer"
            style={{ padding:"8px 10px 6px 12px" }}
            onClick={onToggle}
          >
            <span style={{ width:8, height:8, borderRadius:"50%", background:p.label, flexShrink:0, display:"inline-block" }}/>
            <span className="font-display font-bold uppercase"
              style={{ fontSize:9, color:p.label, letterSpacing:"0.12em" }}>
              {dept}
            </span>
            <span className="ml-auto flex items-center justify-center font-bold"
              style={{ width:16, height:16, fontSize:14, color:p.label, lineHeight:1, flexShrink:0 }}>
              {collapsed ? "+" : "−"}
            </span>
          </div>
        </div>
      </div>
    </foreignObject>
  );
}

/* ═══════════════════════════════════════════
   Tooltip
   ═══════════════════════════════════════════ */
function Tooltip({ tip }) {
  const { show, x, y, d } = tip;
  const p = d ? (DEPT_COLOR[d.dept] || { bg:"#f1f5f9", label:"#475569" }) : {};
  return (
    <div id="tooltip"
      className={`bg-white border border-slate-200 rounded-lg shadow-xl px-4 py-3 font-body ${show?"show":""}`}
      style={{ left:x, top:y, minWidth:170 }}>
      {d && <>
        <p className="font-display font-bold text-slate-800 text-sm mb-0.5">{d.name}</p>
        <p className="text-slate-400 text-xs mb-2">{d.title}</p>
        <div className="flex items-center gap-2">
          <span className="px-2 py-0.5 rounded text-xs font-semibold"
            style={{ background:p.bg, color:p.label }}>{d.dept}</span>
          <span className="text-slate-400 text-xs">📍 {d.location}</span>
        </div>
      </>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   OrgChart — root component
   ═══════════════════════════════════════════ */
function OrgChart() {
  const svgRef = useRef(null);
  const zoomRef = useRef(null);
  const [svgTransform, setSvgTransform] = useState("");
  const [collapsedDepts, setCollapsedDepts] = useState({});
  const [tip, setTip] = useState({ show:false, x:0, y:0, d:null });

  /* --- Full layout (computed once, never changes) --- */
  const allNodes = useMemo(() => {
    const raw = runD3Layout(ORG);
    return separateBoxes(raw);   // push non-nested dept boxes apart
  }, []);
  const allBoxes = useMemo(() => computeDeptBoxes(allNodes), [allNodes]);
  const sortedDepts = useMemo(() => sortDeptsByNesting(allBoxes), [allBoxes]);

  /* --- Visible nodes after applying dept collapse --- */
  const visibleNodes = useMemo(() => {
    return allNodes.filter(n => {
      // A node is hidden if ANY dept in its ancestor chain is collapsed
      // We check: walk up the tree; if the node's own dept is collapsed, hide it
      // but keep the "head" of that dept (the topmost member) visible as a placeholder? 
      // Simpler: just hide all members of a collapsed dept.
      return !collapsedDepts[n.dept];
    });
  }, [allNodes, collapsedDepts]);

  const visibleIds = useMemo(() => new Set(visibleNodes.map(n => n.id)), [visibleNodes]);

  const links = useMemo(() => buildLinks(allNodes, visibleIds, allBoxes, collapsedDepts), [allNodes, visibleIds, allBoxes, collapsedDepts]);

  /* --- D3 zoom (init once) --- */
  useEffect(() => {
    const svg = d3.select(svgRef.current);
    const W   = svgRef.current.clientWidth;
    const zoom = d3.zoom().scaleExtent([0.1, 2.5])
      .on("zoom", e => setSvgTransform(e.transform.toString()));
    zoomRef.current = zoom;
    svg.call(zoom);
    const init = d3.zoomIdentity.translate(W / 2, 48).scale(0.65);
    svg.call(zoom.transform, init);
  }, []);

  function toggleDept(dept) {
    setCollapsedDepts(p => ({ ...p, [dept]: !p[dept] }));
  }
  function expandAll()  { setCollapsedDepts({}); }
  function collapseAll() {
    const all = {};
    Object.keys(allBoxes).forEach(d => { all[d] = true; });
    setCollapsedDepts(all);
  }

  return (
    <div className="flex flex-col h-screen w-screen font-body" style={{ background:"#f8fafc" }}>

      {/* Header */}
      <header className="flex items-center justify-between px-8 py-3 bg-white border-b border-slate-200 shadow-sm flex-shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded border border-slate-200 flex items-center justify-center bg-slate-50">
            <svg viewBox="0 0 20 20" className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="1.5">
              <rect x="7" y="1" width="6" height="5" rx="1"/>
              <rect x="1" y="13" width="6" height="5" rx="1"/>
              <rect x="13" y="13" width="6" height="5" rx="1"/>
              <line x1="10" y1="6" x2="10" y2="10"/>
              <line x1="4"  y1="10" x2="16" y2="10"/>
              <line x1="4"  y1="10" x2="4"  y2="13"/>
              <line x1="16" y1="10" x2="16" y2="13"/>
            </svg>
          </div>
          <div>
            <h1 className="font-display text-lg font-bold text-slate-800 leading-tight">Organisation Chart</h1>
            <p className="text-xs text-slate-400 tracking-widest uppercase mt-0.5">Acme Corporation · 2025</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={expandAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Expand All
          </button>
          <button onClick={collapseAll}
            className="px-3 py-1.5 text-xs font-semibold border border-slate-300 rounded text-slate-600 bg-white hover:bg-slate-50 transition-colors">
            Collapse All
          </button>
        </div>
      </header>

      {/* Canvas */}
      <div className="chart-area flex-1 relative overflow-hidden">
        <svg ref={svgRef} className="chart-svg">
          <g transform={svgTransform}>

            {/* Dept boxes — outermost first (so inner boxes render on top) */}
            {sortedDepts.map(dept => {
              const b = allBoxes[dept];
              return (
                <DeptBox
                  key={dept}
                  dept={dept}
                  x={b.x} y={b.y} w={b.w} h={b.h}
                  collapsed={!!collapsedDepts[dept]}
                  onToggle={() => toggleDept(dept)}
                />
              );
            })}

            {/* Links */}
            {links.map(l => (
              <path key={l.id} className={l.dashed ? "link-path-dashed" : "link-path"} d={elbowPath(l.px, l.py, l.cx, l.cy)} />
            ))}

            {/* Cards — only visible ones */}
            {visibleNodes.map(n => (
              <foreignObject key={n.id} x={n.x} y={n.y} width={NW} height={NH} style={{ overflow:"visible" }}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{ width:NW, height:NH }}>
                  <NodeCard
                    data={n.data}
                    onMouseEnter={e => setTip({ show:true, x:e.clientX+14, y:e.clientY-10, d:n.data })}
                    onMouseLeave={() => setTip(t => ({ ...t, show:false }))}
                  />
                </div>
              </foreignObject>
            ))}

          </g>
        </svg>

        {/* Legend */}
        <div className="absolute bottom-5 left-5 bg-white border border-slate-200 rounded-lg shadow-sm p-3.5">
          <p className="font-display font-bold text-slate-500 mb-2 uppercase tracking-widest" style={{ fontSize:9 }}>Departments</p>
          {Object.entries(DEPT_COLOR).map(([dept, p]) => (
            <div key={dept} className="flex items-center gap-2 mb-1.5 last:mb-0">
              <span className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background:p.label }}/>
              <span className="text-slate-500 text-xs">{dept}</span>
            </div>
          ))}
        </div>

        {/* Hints */}
        <div className="absolute bottom-5 right-5 flex flex-col items-end gap-1.5">
          {["Scroll · Zoom","Drag · Pan","Click dept label · Toggle"].map(h => (
            <span key={h} className="bg-white border border-slate-200 rounded px-2.5 py-1 text-xs text-slate-400 shadow-sm">{h}</span>
          ))}
        </div>
      </div>

      <Tooltip tip={tip} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OrgChart/>);
</script>
</body>
</html>
